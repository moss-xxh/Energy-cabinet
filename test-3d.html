<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D测试</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #canvas { width: 100vw; height: 100vh; display: block; }
        #error { position: absolute; top: 10px; left: 10px; color: red; font-size: 16px; }
        #info { position: absolute; top: 10px; right: 10px; color: green; font-size: 16px; }
    </style>
</head>
<body>
    <div id="canvas"></div>
    <div id="error"></div>
    <div id="info">Three.js版本: <span id="version"></span></div>
    
    <script>
        // 显示Three.js版本
        document.getElementById('version').textContent = THREE.REVISION;
        
        // 错误处理
        window.addEventListener('error', function(e) {
            document.getElementById('error').textContent = '错误: ' + e.message;
            console.error(e);
        });
        
        try {
            // 创建场景
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe0e0e0);
            
            // 创建相机
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            
            // 创建渲染器
            const renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas').appendChild(renderer.domElement);
            
            // 添加灯光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.4);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);
            
            // 创建一个简单的立方体
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x00ff00,
                metalness: 0.3,
                roughness: 0.4
            });
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);
            
            // 创建控制器
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            // 动画循环
            function animate() {
                requestAnimationFrame(animate);
                
                // 旋转立方体
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;
                
                controls.update();
                renderer.render(scene, camera);
            }
            
            animate();
            
            // 窗口调整
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            console.log('3D场景创建成功');
            
        } catch (error) {
            document.getElementById('error').textContent = '初始化失败: ' + error.message;
            console.error('初始化错误:', error);
        }
    </script>
</body>
</html>
