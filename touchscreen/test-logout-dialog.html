<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退出确认弹窗演示</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0f1b;
            color: white;
            min-height: 100vh;
        }
        
        .demo-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #00d4ff;
            text-align: center;
            margin-bottom: 40px;
        }
        
        .demo-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .demo-button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #0096ff 0%, #0077cc 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 10px;
        }
        
        .demo-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 150, 255, 0.4);
        }
        
        .feature-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }
        
        .feature-list li {
            padding: 15px;
            margin: 10px 0;
            background: rgba(0, 150, 255, 0.1);
            border-left: 4px solid #00d4ff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .icon {
            width: 24px;
            height: 24px;
            color: #00d4ff;
        }
        
        /* 复制数据页面的弹窗样式 */
        .confirm-dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .confirm-dialog-overlay.show {
            opacity: 1;
        }
        
        .confirm-dialog {
            background: linear-gradient(135deg, rgba(20, 30, 48, 0.98) 0%, rgba(10, 20, 40, 0.98) 100%);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 
                0 10px 40px rgba(0, 150, 255, 0.3),
                0 0 100px rgba(0, 150, 255, 0.1),
                inset 0 0 30px rgba(0, 150, 255, 0.05);
            position: relative;
            overflow: hidden;
        }
        
        .confirm-dialog::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #0096ff, #00d4ff, #0096ff);
            border-radius: 20px;
            opacity: 0.5;
            z-index: -1;
            animation: borderGlow 3s linear infinite;
        }
        
        @keyframes borderGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        
        .confirm-dialog-overlay.show .confirm-dialog {
            transform: scale(1);
        }
        
        .confirm-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: rgba(0, 150, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #0096ff;
        }
        
        .confirm-title {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .confirm-message {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        .confirm-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .confirm-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }
        
        .confirm-btn.cancel {
            background: rgba(107, 114, 128, 0.2);
            border: 1px solid rgba(107, 114, 128, 0.3);
            color: rgba(255, 255, 255, 0.7);
        }
        
        .confirm-btn.cancel:hover {
            background: rgba(107, 114, 128, 0.3);
            border-color: rgba(107, 114, 128, 0.5);
        }
        
        .confirm-btn.confirm {
            background: linear-gradient(135deg, #0096ff 0%, #0077cc 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 150, 255, 0.3);
        }
        
        .confirm-btn.confirm:hover {
            background: linear-gradient(135deg, #0077cc 0%, #005599 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 150, 255, 0.4);
        }
        
        .preview-image {
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            display: block;
            border: 2px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <h1>系统退出确认弹窗演示</h1>
        
        <div class="demo-section">
            <h2 style="color: #00d4ff; margin-bottom: 20px;">弹窗特性</h2>
            <ul class="feature-list">
                <li>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    自定义系统风格弹窗，非浏览器默认弹窗
                </li>
                <li>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"></path>
                    </svg>
                    深色主题设计，与系统整体风格一致
                </li>
                <li>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 6v6l4 2"></path>
                    </svg>
                    平滑的显示/隐藏动画效果
                </li>
                <li>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
                        <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
                        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                        <line x1="12" y1="20" x2="12.01" y2="20"></line>
                    </svg>
                    发光边框效果，突出显示
                </li>
                <li>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
                    </svg>
                    支持中英文语言切换
                </li>
            </ul>
        </div>
        
        <div class="demo-section">
            <h2 style="color: #00d4ff; margin-bottom: 20px;">演示效果</h2>
            <div style="text-align: center;">
                <button class="demo-button" onclick="showLogoutDialog('zh')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    显示中文退出弹窗
                </button>
                
                <button class="demo-button" onclick="showLogoutDialog('en')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    Show English Logout Dialog
                </button>
            </div>
        </div>
        
        <div class="demo-section">
            <h2 style="color: #00d4ff; margin-bottom: 20px;">实际页面集成</h2>
            <p style="color: rgba(255, 255, 255, 0.7); line-height: 1.6;">
                退出按钮位于页面右上角，与语言切换按钮并排。点击退出按钮后，会弹出这个自定义的确认对话框，
                而不是浏览器的默认 alert 或 confirm 弹窗。弹窗具有毛玻璃背景、发光边框、缩放动画等视觉效果。
            </p>
            <iframe src="data.html" style="width: 100%; height: 500px; border: 2px solid rgba(0, 150, 255, 0.3); border-radius: 10px; margin-top: 20px;"></iframe>
        </div>
    </div>
    
    <script>
        function showLogoutDialog(lang) {
            const translations = {
                zh: {
                    confirmLogout: '确认退出',
                    confirmLogoutMessage: '您确定要退出登录吗？',
                    cancel: '取消',
                    confirm: '确定'
                },
                en: {
                    confirmLogout: 'Confirm Logout',
                    confirmLogoutMessage: 'Are you sure you want to logout?',
                    cancel: 'Cancel',
                    confirm: 'Confirm'
                }
            };
            
            const t = translations[lang];
            
            // 创建弹窗
            const confirmDialog = document.createElement('div');
            confirmDialog.className = 'confirm-dialog-overlay';
            confirmDialog.innerHTML = `
                <div class="confirm-dialog">
                    <div class="confirm-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg>
                    </div>
                    <h3 class="confirm-title">${t.confirmLogout}</h3>
                    <p class="confirm-message">${t.confirmLogoutMessage}</p>
                    <div class="confirm-buttons">
                        <button class="confirm-btn cancel" onclick="closeDialog()">${t.cancel}</button>
                        <button class="confirm-btn confirm" onclick="confirmAction()">${t.confirm}</button>
                    </div>
                </div>
            `;
            document.body.appendChild(confirmDialog);
            
            // 添加显示动画
            setTimeout(() => {
                confirmDialog.classList.add('show');
            }, 10);
        }
        
        function closeDialog() {
            const dialog = document.querySelector('.confirm-dialog-overlay');
            if (dialog) {
                dialog.classList.remove('show');
                setTimeout(() => {
                    dialog.remove();
                }, 300);
            }
        }
        
        function confirmAction() {
            alert('在实际应用中，这里会执行退出登录操作');
            closeDialog();
        }
    </script>
</body>
</html>
