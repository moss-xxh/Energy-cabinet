<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简约退出弹窗示例</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #f5f5f5;
        }
        
        .demo-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            padding: 50px 0;
        }
        
        .demo-btn {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        
        .demo-btn:hover {
            background: #2563eb;
        }
        
        /* 简约大气的确认对话框样式 */
        .confirm-dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.2s ease;
            visibility: hidden;
        }
        
        .confirm-dialog-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        .confirm-dialog {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            transform: scale(0.95) translateY(10px);
            transition: transform 0.2s ease;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .confirm-dialog-overlay.show .confirm-dialog {
            transform: scale(1) translateY(0);
        }
        
        .dialog-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .dialog-icon {
            width: 40px;
            height: 40px;
            background: #fee2e2;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .dialog-icon svg {
            width: 20px;
            height: 20px;
            color: #ef4444;
        }
        
        .dialog-content {
            flex: 1;
            text-align: left;
        }
        
        .dialog-title {
            font-size: 18px;
            font-weight: 600;
            color: #111827;
            margin: 0 0 4px 0;
            line-height: 1.25;
        }
        
        .dialog-message {
            font-size: 14px;
            color: #6b7280;
            margin: 0;
            line-height: 1.5;
        }
        
        .dialog-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .dialog-btn {
            flex: 1;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
            line-height: 20px;
        }
        
        .dialog-btn:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .dialog-btn-cancel {
            background: #ffffff;
            color: #374151;
            border: 1px solid #e5e7eb;
        }
        
        .dialog-btn-cancel:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }
        
        .dialog-btn-confirm {
            background: #ef4444;
            color: white;
        }
        
        .dialog-btn-confirm:hover {
            background: #dc2626;
        }
        
        /* 深色主题版本 */
        .dark-theme {
            background: #1a1a1a;
            color: white;
        }
        
        .dark-theme .confirm-dialog {
            background: #1f2937;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
        }
        
        .dark-theme .dialog-icon {
            background: rgba(239, 68, 68, 0.1);
        }
        
        .dark-theme .dialog-title {
            color: #f3f4f6;
        }
        
        .dark-theme .dialog-message {
            color: #9ca3af;
        }
        
        .dark-theme .dialog-btn-cancel {
            background: #374151;
            color: #e5e7eb;
            border-color: #4b5563;
        }
        
        .dark-theme .dialog-btn-cancel:hover {
            background: #4b5563;
            border-color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <h1>简约大气的退出弹窗</h1>
        
        <p>点击下面的按钮查看不同风格的弹窗效果：</p>
        
        <button class="demo-btn" onclick="showDialog('light')">浅色主题弹窗</button>
        <button class="demo-btn" onclick="showDialog('dark')" style="margin-left: 16px;">深色主题弹窗</button>
        
        <div style="margin-top: 50px; text-align: left; background: white; padding: 20px; border-radius: 8px;">
            <h3>设计特点：</h3>
            <ul style="color: #6b7280;">
                <li>简洁的卡片式设计</li>
                <li>清晰的信息层级</li>
                <li>温和的阴影效果</li>
                <li>优雅的动画过渡</li>
                <li>符合现代UI设计规范</li>
                <li>支持深色和浅色主题</li>
            </ul>
        </div>
    </div>
    
    <script>
        function showDialog(theme) {
            const overlay = document.createElement('div');
            overlay.className = 'confirm-dialog-overlay';
            
            const dialogHTML = `
                <div class="confirm-dialog ${theme === 'dark' ? 'dark-theme' : ''}">
                    <div class="dialog-header">
                        <div class="dialog-icon">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 7H6a2 2 0 00-2 2v9a2 2 0 002 2h9a2 2 0 002-2v-5m-1 1V3m0 0h-4m4 0l-5 5" transform="rotate(-45 10 10)"/>
                            </svg>
                        </div>
                        <div class="dialog-content">
                            <h3 class="dialog-title">退出登录</h3>
                            <p class="dialog-message">您确定要退出当前账户吗？退出后需要重新登录。</p>
                        </div>
                    </div>
                    <div class="dialog-buttons">
                        <button class="dialog-btn dialog-btn-cancel" onclick="closeDialog(this)">取消</button>
                        <button class="dialog-btn dialog-btn-confirm" onclick="confirmLogout(this)">退出</button>
                    </div>
                </div>
            `;
            
            overlay.innerHTML = dialogHTML;
            document.body.appendChild(overlay);
            
            // 触发显示动画
            setTimeout(() => {
                overlay.classList.add('show');
            }, 10);
        }
        
        function closeDialog(btn) {
            const overlay = btn.closest('.confirm-dialog-overlay');
            overlay.classList.remove('show');
            setTimeout(() => {
                overlay.remove();
            }, 200);
        }
        
        function confirmLogout(btn) {
            alert('执行退出操作');
            closeDialog(btn);
        }
    </script>
</body>
</html>
