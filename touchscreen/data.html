<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据监控 - 储能柜管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0e1a;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 科技风背景网格 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 150, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* 动态光效背景 */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 0;
        }

        .bg-effects::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.15) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
            top: -50%;
            left: -50%;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 头部导航 */
        .header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            position: relative;
            z-index: 100;
            gap: 40px;
            flex-wrap: nowrap;
            min-width: 0;
        }

        /* Logo区域 */
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: none;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(90deg, #0096ff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 导航菜单 */
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            justify-content: center;
            flex-wrap: nowrap;
            min-width: 0;
        }

        .nav-item {
            padding: 12px 28px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 17px;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
            border-radius: 8px;
            white-space: nowrap;
            display: inline-block;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-item:hover {
            color: #00d4ff;
            background: rgba(0, 150, 255, 0.1);
        }

        .nav-item:hover::before {
            width: 80%;
        }

        .nav-item.active {
            color: #00d4ff;
            background: rgba(0, 150, 255, 0.15);
        }

        .nav-item.active::before {
            width: 80%;
            background: #00d4ff;
            box-shadow: 0 0 10px #00d4ff;
        }

        /* 头部右侧 */
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* 时间显示 */
        .header-time {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-family: 'SF Mono', monospace;
            letter-spacing: 1px;
        }

        /* 科技风图标按钮 */
        .tech-icon-btn {
            width: 40px;
            height: 40px;
            background: rgba(0, 150, 255, 0.1);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tech-icon-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.6) 0%, transparent 70%);
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
        }

        .tech-icon-btn:hover {
            background: rgba(0, 150, 255, 0.2);
            border-color: rgba(0, 150, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 150, 255, 0.4);
        }

        .tech-icon-btn:hover::before {
            width: 100px;
            height: 100px;
        }

        .tech-icon-btn:active {
            transform: translateY(0);
        }

        /* 图标样式 */
        .tech-icon {
            width: 20px;
            height: 20px;
            position: relative;
            z-index: 1;
        }

        /* 语言切换图标 */
        .lang-icon {
            width: 20px;
            height: 20px;
            border: 2px solid #00d4ff;
            border-radius: 50%;
            position: relative;
        }

        .lang-icon::before,
        .lang-icon::after {
            content: '';
            position: absolute;
            border: 1px solid #00d4ff;
            border-radius: 50%;
        }

        .lang-icon::before {
            width: 100%;
            height: 8px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .lang-icon::after {
            width: 8px;
            height: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 退出图标 */
        .logout-icon {
            width: 20px;
            height: 20px;
            position: relative;
        }

        .logout-icon::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid #00d4ff;
            border-right: none;
            border-radius: 2px 0 0 2px;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        .logout-icon::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 2px;
            background: #00d4ff;
            right: 2px;
            top: 50%;
            transform: translateY(-50%);
        }

        .logout-icon .arrow {
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 4px 0 4px 6px;
            border-color: transparent transparent transparent #00d4ff;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        /* 新的语言切换器样式 */
        .lang-switcher {
            position: relative;
            margin-left: 15px;
        }
        
        .lang-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0;
        }
        
        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .lang-btn svg {
            width: 20px;
            height: 20px;
        }
        
        /* 语言下拉菜单 - 白色卡片风格 */
        .lang-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: white;
            border-radius: 12px;
            padding: 8px;
            min-width: 140px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .lang-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .lang-option {
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #1f2937;
            font-weight: 500;
        }

        .lang-option:hover {
            background: #f3f4f6;
        }

        .lang-option.active {
            background: #e5f3ff;
            color: #2563eb;
        }
        
        .lang-option .flag {
            font-size: 18px;
            line-height: 1;
        }
        
        /* 退出按钮样式 - 与语言按钮一致 */
        .logout-wrapper {
            margin-left: 15px;
        }
        
        .logout-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0;
        }
        
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .logout-btn svg {
            width: 20px;
            height: 20px;
        }

        /* 工具提示 */
        .tooltip {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .tech-icon-btn:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        /* 主内容容器 */
        .main-container {
            height: calc(100vh - 60px);
            display: flex;
            position: relative;
            z-index: 1;
        }

        /* 左侧组件列表 */
        .component-sidebar {
            width: 220px;
            padding: 20px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(0, 150, 255, 0.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }


        .component-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        /* OTA升级按钮 */
        .ota-upgrade-box {
            margin-top: auto;
            margin-bottom: 15px;
        }
        
        .ota-upgrade-btn {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #0096ff 0%, #00d4ff 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 150, 255, 0.3);
        }
        
        .ota-upgrade-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 150, 255, 0.4);
        }
        
        .ota-upgrade-btn:active {
            transform: translateY(0);
        }
        
        .ota-upgrade-btn i {
            font-size: 18px;
        }


        .component-item {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(0, 150, 255, 0.2);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .component-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 150, 255, 0.15), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .component-item:hover {
            color: rgba(255, 255, 255, 0.95);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 150, 255, 0.4);
            transform: translateX(5px);
        }

        .component-item.active {
            color: #00d4ff;
            background: rgba(0, 150, 255, 0.15);
            border-color: rgba(0, 150, 255, 0.5);
            box-shadow: inset 0 0 20px rgba(0, 150, 255, 0.2);
        }

        .component-item.active::before {
            opacity: 1;
        }

        .component-icon {
            width: 36px;
            height: 36px;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            opacity: 0.8;
        }

        .component-item.active .component-icon {
            opacity: 1;
        }

        .component-status {
            margin-left: auto;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 6px #00ff88;
        }

        /* 右侧内容区 */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 14, 26, 0.5);
            overflow: hidden;
        }

        /* 容器 */
        .data-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* 内容区域 */
        .content-section {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .content-section.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        /* 子标签页 */
        .sub-tabs {
            display: flex;
            gap: 30px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
            flex-shrink: 0;
            position: relative;
        }
        
        /* 数据设置按钮 */
        .data-settings-btn {
            position: absolute;
            right: 0;
            top: 0;
            background: rgba(0, 150, 255, 0.1);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 6px;
            padding: 6px 12px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .data-settings-btn:hover {
            background: rgba(0, 150, 255, 0.2);
            color: #00d4ff;
            border-color: rgba(0, 150, 255, 0.5);
        }
        
        /* 设置面板 */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(0, 150, 255, 0.3);
            z-index: 1000;
            transition: right 0.3s ease;
            overflow-y: auto;
        }
        
        .settings-panel.show {
            right: 0;
        }
        
        .settings-header {
            padding: 20px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .settings-title {
            font-size: 18px;
            color: #00d4ff;
        }
        
        .settings-close {
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .settings-close:hover {
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
        }
        
        .settings-content {
            padding: 20px;
        }
        
        .settings-section {
            margin-bottom: 30px;
        }
        
        .settings-section-title {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .field-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 150, 255, 0.1);
            border-radius: 6px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }
        
        .field-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 150, 255, 0.3);
        }
        
        .field-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .field-toggle {
            position: relative;
            width: 40px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .field-toggle.active {
            background: rgba(0, 150, 255, 0.5);
        }
        
        .field-toggle::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s ease;
        }
        
        .field-toggle.active::after {
            left: 22px;
        }

        /* 设置类型选择 */
        .settings-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .type-btn {
            flex: 1;
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .type-btn.active {
            background: rgba(0, 150, 255, 0.3);
            color: #00d4ff;
        }

        .sub-tab {
            padding: 8px 0;
            padding-bottom: 15px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .sub-tab:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .sub-tab.active {
            color: #00d4ff;
        }

        .sub-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        /* 子内容区域 */
        .sub-content {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .sub-content.active {
            display: block;
        }
        
        /* 自定义滚动条样式 */
        .sub-content::-webkit-scrollbar {
            width: 8px;
        }
        
        .sub-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        .sub-content::-webkit-scrollbar-thumb {
            background: rgba(0, 150, 255, 0.3);
            border-radius: 4px;
        }
        
        .sub-content::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 150, 255, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 实时数据网格 - 固定4列布局 */
        .realtime-grid {
            display: grid;
            grid-template-columns: repeat(4, 260px);
            gap: 15px;
            margin-bottom: 45px;
        }

        /* 历史数据网格 */
        .history-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .data-card {
            background: rgba(15, 25, 42, 0.6);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            min-width: 0;
            backdrop-filter: blur(10px);
            width: 260px;
            height: 130px;
            box-sizing: border-box;
        }

        .data-card:hover {
            border-color: rgba(0, 150, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 150, 255, 0.15);
            transform: translateY(-3px);
        }

        .data-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #0096ff, #00d4ff);
        }

        .card-title {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            line-height: 1.2;
        }

        .card-unit {
            font-size: 14px;
            color: rgba(0, 212, 255, 0.8);
            margin-left: 4px;
            font-weight: 500;
        }

        .card-status {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        .card-status.good {
            color: #00ff88;
        }

        .card-status.warning {
            color: #ffa500;
        }

        function generateFieldSettingsContent(component, type) {
            const config = dataFieldsConfig[component][type];
            if (!config) return '';
            
            let html = '';
            
            for (const category in config) {
                html += `<div class="field-category">`;
                html += `<div class="field-category-title">${category}</div>`;
                
                for (const field in config[category]) {
                    const fieldConfig = config[category][field];
                    const isChecked = shouldShowField(component, type, field);
                    
                    html += `
                        <div class="field-item">
                            <input type="checkbox" 
                                   class="field-checkbox" 
                                   id="${component}_${type}_${field}"
                                   ${isChecked ? 'checked' : ''}>
                            <label class="field-label" for="${component}_${type}_${field}">
                                ${fieldConfig.label}
                            </label>
                        </div>
                    `;
                }
                
                html += `</div>`;
            }
            
            return html;
        }
        
        // 切换设置标签
        function switchSettingsTab(component, tab) {
            // 更新标签状态
            document.querySelectorAll('.settings-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 更新内容
            document.getElementById('settingsContent').innerHTML = generateFieldSettingsContent(component, tab);
        }
        
        // 关闭字段设置
        function closeFieldSettings() {
            const dialog = document.querySelector('.field-settings-dialog');
            if (dialog) {
                dialog.remove();
            }
        }
        
        // 保存字段设置
        function saveFieldSettings(component) {
            // 获取所有复选框状态
            const checkboxes = document.querySelectorAll('.field-checkbox');
            
            checkboxes.forEach(checkbox => {
                const [comp, type, field] = checkbox.id.split('_');
                if (comp === component) {
                    // 初始化嵌套结构
                    if (!userFieldSettings[component]) {
                        userFieldSettings[component] = {};
                    }
                    if (!userFieldSettings[component][type]) {
                        userFieldSettings[component][type] = {};
                    }
                    
                    // 保存状态
                    userFieldSettings[component][type][field] = checkbox.checked;
                }
            });
            
            // 保存到localStorage
            localStorage.setItem('touchscreenFieldSettings', JSON.stringify(userFieldSettings));
            
            // 关闭对话框
            closeFieldSettings();
            
            // 刷新当前组件显示
            renderComponentData(component);
            
            // 如果当前在历史数据标签页，刷新历史数据
            const activeSubTab = document.querySelector(`#${component}Section .sub-tab.active`);
            if (activeSubTab && activeSubTab.textContent.includes('历史数据')) {
                renderHistoryData(component);
            }
        }
        
        // 初始化字段设置
        function initFieldSettings() {
            let needsSave = false;
            
            for (const component in dataFieldsConfig) {
                if (!userFieldSettings[component]) {
                    userFieldSettings[component] = { realtime: {}, history: {} };
                    needsSave = true;
                }
                
                // 初始化实时数据设置
                for (const section in dataFieldsConfig[component].realtime) {
                    for (const field in dataFieldsConfig[component].realtime[section]) {
                        if (userFieldSettings[component].realtime[field] === undefined) {
                            const defaultValue = dataFieldsConfig[component].realtime[section][field].default;
                            userFieldSettings[component].realtime[field] = defaultValue;
                            needsSave = true;
                        }
                    }
                }
                
                // 初始化历史数据设置
                if (dataFieldsConfig[component].history) {
                    for (const field in dataFieldsConfig[component].history) {
                        if (userFieldSettings[component].history[field] === undefined) {
                            const defaultValue = dataFieldsConfig[component].history[field].default;
                            userFieldSettings[component].history[field] = defaultValue;
                            needsSave = true;
                        }
                    }
                }
            }
            
            if (needsSave) {
                localStorage.setItem('touchscreenFieldSettings', JSON.stringify(userFieldSettings));
            }
        }

        // 切换设置类型
        function switchSettingsType(type) {
            currentSettingsType = type;
            
            // 更新按钮状态
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`${type}-type-btn`).classList.add('active');
            
            // 重新渲染设置内容
            if (currentComponent) {
                renderSettingsContent(currentComponent);
            }
        }

        // 打开设置面板
        function openSettings(component) {
            currentComponent = component;
            const activeSubTab = document.querySelector(`#${component}Section .sub-tab.active`);
            const isHistory = activeSubTab && activeSubTab.textContent === '历史数据';
            
            // 设置默认类型
            currentSettingsType = isHistory ? 'history' : 'realtime';
            switchSettingsType(currentSettingsType);
            
            renderSettingsContent(component);
            
            document.getElementById('settingsPanel').classList.add('show');
            document.getElementById('overlay').classList.add('show');
        }

        // 渲染设置内容
        function renderSettingsContent(component) {
            const settingsContent = document.getElementById('settingsContent');
            settingsContent.innerHTML = '';

            const config = dataFieldsConfig[component][currentSettingsType];
            if (!config) {
                settingsContent.innerHTML = '<p style="color: rgba(255,255,255,0.5); text-align: center;">该组件暂无可配置项</p>';
                return;
            }
            
            if (currentSettingsType === 'realtime') {
                // 实时数据：按section分组
                for (const section in config) {
                    const sectionDiv = document.createElement('div');
                    sectionDiv.className = 'settings-section';
                    
                    const sectionTitle = document.createElement('div');
                    sectionTitle.className = 'settings-section-title';
                    sectionTitle.textContent = section;
                    sectionDiv.appendChild(sectionTitle);

                    for (const field in config[section]) {
                        const fieldItem = document.createElement('div');
                        fieldItem.className = 'field-item';
                        
                        const label = document.createElement('span');
                        label.className = 'field-label';
                        label.textContent = config[section][field].label;
                        
                        const toggle = document.createElement('div');
                        toggle.className = 'field-toggle';
                        
                        // 检查字段状态：如果用户设置存在就用用户设置，否则用默认值
                        let isActive = config[section][field].default; // 默认值
                        if (userFieldSettings[component] && userFieldSettings[component][currentSettingsType] && userFieldSettings[component][currentSettingsType][field] !== undefined) {
                            isActive = userFieldSettings[component][currentSettingsType][field];
                        }
                        
                        if (isActive) {
                            toggle.classList.add('active');
                        }
                        
                        toggle.onclick = () => {
                            toggle.classList.toggle('active');
                            
                            // 确保用户设置对象存在
                            if (!userFieldSettings[component]) {
                                userFieldSettings[component] = { realtime: {}, history: {} };
                            }
                            if (!userFieldSettings[component][currentSettingsType]) {
                                userFieldSettings[component][currentSettingsType] = {};
                            }
                            
                            userFieldSettings[component][currentSettingsType][field] = toggle.classList.contains('active');
                            localStorage.setItem('touchscreenFieldSettings', JSON.stringify(userFieldSettings));
                            
                            renderComponentData(component);
                        };
                        
                        fieldItem.appendChild(label);
                        fieldItem.appendChild(toggle);
                        sectionDiv.appendChild(fieldItem);
                    }
                    
                    settingsContent.appendChild(sectionDiv);
                }
            } else {
                // 历史数据：按分类显示
                for (const category in config) {
                    const sectionDiv = document.createElement('div');
                    sectionDiv.className = 'settings-section';
                    
                    const sectionTitle = document.createElement('div');
                    sectionTitle.className = 'settings-section-title';
                    sectionTitle.textContent = category;
                    sectionDiv.appendChild(sectionTitle);

                    const categoryFields = config[category];
                    for (const field in categoryFields) {
                        const fieldItem = document.createElement('div');
                        fieldItem.className = 'field-item';
                        
                        const label = document.createElement('span');
                        label.className = 'field-label';

                        toggle.className = 'field-toggle';

                        let isActive = categoryFields[field].default; // 默认值
                        if (userFieldSettings[component] && userFieldSettings[component][currentSettingsType] && userFieldSettings[component][currentSettingsType][field] !== undefined) {
                            isActive = userFieldSettings[component][currentSettingsType][field];
                        }

                            if (!userFieldSettings[component][currentSettingsType]) {

                            localStorage.setItem('touchscreenFieldSettings', JSON.stringify(userFieldSettings));

                        fieldItem.appendChild(toggle);
                        sectionDiv.appendChild(fieldItem);

                        <div style="font-size: 12px; color: ${statusColor}; margin-top: 4px;">${config.subValue}</div>
                    `;
                } else if (config.unit) {
                    // 有单位的数值
                    card.innerHTML = `
                        <div class="card-title">${config.label}</div>
                        <div class="card-value">
                            <span id="${field}Value">${config.value}</span>
                            <span class="card-unit">${config.unit}</span>
                        </div>
                        ${config.status ? `<div style="font-size: 12px; color: ${statusColor || '#666'}; margin-top: 4px;">${config.status}</div>` : ''}
                    `;
                } else {
                    // 纯文本值
                    card.innerHTML = `
                        <div class="card-title">${config.label}</div>
                        <div class="card-value">
                            <span style="font-size: 16px; color: ${statusColor};">${config.value}</span>
                        </div>
                        ${config.status ? `<div style="font-size: 12px; color: ${statusColor || '#666'}; margin-top: 4px;">${config.status}</div>` : ''}
                    `;
                }
            } else {
                // 使用原有的动态值逻辑
                const statusText = getFieldStatus(field);
                const statusClass = getStatusClass(statusText);
                
                card.innerHTML = `
                    <div class="card-title">${config.label}</div>
                    <div class="card-value">
                        <span id="${field}Value">${getFieldValue(field)}</span>
                        ${config.unit ? `<span class="card-unit">${config.unit}</span>` : ''}
                    </div>
                    <div class="card-status ${statusClass}">
                        <span>${statusText}</span>
                    </div>
                `;
            }
            
            return card;
        }

        // 根据状态文字返回对应的CSS类
        function getStatusClass(statusText) {
            if (statusText.includes('良好') || statusText.includes('充足') || statusText.includes('健康')) {
                return 'good';
            } else if (statusText.includes('正常') || statusText.includes('稳定') || statusText.includes('运行')) {
                return 'normal';
            } else if (statusText.includes('警告') || statusText.includes('偏高') || statusText.includes('偏低')) {
                return 'warning';
            } else if (statusText.includes('错误') || statusText.includes('故障') || statusText.includes('异常')) {
                return 'error';
            }
            return 'normal'; // 默认
        }

        // 初始化特定图表
        function initSpecificChart(canvas, type) {
            const ctx = canvas.getContext('2d');
            
            switch(type) {
                case 'powerHistory':
                    // 功率曲线
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: Array.from({length: 24}, (_, i) => i + ':00'),
                            datasets: [{
                                label: '功率 (kW)',
                                data: Array.from({length: 24}, () => (Math.random() - 0.5) * 200),
                                borderColor: '#00d4ff',
                                backgroundColor: 'rgba(0, 212, 255, 0.1)',
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: getChartOptions('功率 (kW)')
                    });
                    break;
                    
                case 'socHistory':
                    // SOC与充放电状态
                    new Chart(ctx, {
                        type: 'line',

                            labels: Array.from({length: 24}, (_, i) => i + ':00'),
                            datasets: [{
                                label: 'SOC (%)',

        // 更新数据值
        function updateDataValues(component) {
            const section = document.getElementById(component + 'Section');
            if (!section) return;
            
            // 检查是否在实时数据标签页
            const activeSubTab = section.querySelector('.sub-tab.active');
            if (!activeSubTab || !activeSubTab.textContent.includes('实时数据')) return;
            
            // 更新所有数据卡片的值
            const dataCards = section.querySelectorAll('.data-card');
            dataCards.forEach(card => {
                const valueElement = card.querySelector('.data-value');
                if (valueElement) {
                    // 生成随机变化的数据
                    const currentValue = parseFloat(valueElement.textContent) || 0;
                    const variation = (Math.random() - 0.5) * 0.1; // ±5%的变化
                    const newValue = currentValue * (1 + variation);
                    
                    // 保留合适的小数位数
                    if (valueElement.parentElement.querySelector('.data-unit')?.textContent.includes('kW') ||
                        valueElement.parentElement.querySelector('.data-unit')?.textContent.includes('V') ||
                        valueElement.parentElement.querySelector('.data-unit')?.textContent.includes('A')) {
                        valueElement.textContent = newValue.toFixed(1);
                    } else if (valueElement.parentElement.querySelector('.data-unit')?.textContent.includes('%')) {
                        valueElement.textContent = Math.min(100, Math.max(0, newValue)).toFixed(1);
                    } else {
                        valueElement.textContent = newValue.toFixed(0);
                    }
                }
            });
        }

        // 检查字段是否应该显示

            // 检查用户设置
            if (userFieldSettings[component] && userFieldSettings[component][type] && userFieldSettings[component][type][field] !== undefined) {
                return userFieldSettings[component][type][field];
            }
            
            // 如果没有用户设置，使用默认值
            const config = dataFieldsConfig[component] && dataFieldsConfig[component][type];
            if (config) {
                // 检查是否为分类结构（如历史数据）
                for (const category in config) {
                    if (config[category][field]) {
                        return config[category][field].default || false;
                    }
                }
                // 检查是否为直接字段结构（如实时数据的某些组件）
                if (config[field]) {
                    return config[field].default || false;
                }
            }
            
            return false;
        }

        function generateHistoryDailyData(timeRange, endDate) {
            const labels = [];
            const powerData = [];
            const socData = [];
            
            // 生成24小时的时间点数据
            for (let hour = 0; hour < 24; hour++) {
                labels.push(`${hour.toString().padStart(2, '0')}:00`);
                
                // 模拟功率数据 (-50 到 50 kW)，根据时间段调整
                let basePower = 0;
                if (hour >= 8 && hour <= 18) {
                    // 白天放电
                    basePower = -20 - Math.random() * 30;
                } else if (hour >= 23 || hour <= 6) {
                    // 夜间充电
                    basePower = 15 + Math.random() * 25;
                } else {
                    // 过渡时段
                    basePower = (Math.random() - 0.5) * 20;
                }
                powerData.push(basePower);
                
                // 模拟SOC数据，根据充放电调整
                let socValue;
                if (hour === 0) {
                    socValue = 50 + Math.random() * 20;
                } else {
                    const prevSoc = socData[hour - 1] || 60;
                    const powerEffect = basePower > 0 ? 2 : basePower < 0 ? -1.5 : 0;
                    socValue = Math.max(20, Math.min(95, prevSoc + powerEffect + (Math.random() - 0.5) * 3));
                }
                socData.push(socValue);
            }
            
            return { labels, powerData, socData };
        }

        function generateRevenueData(timeType) {
            let labels, chargingData, dischargingData, revenueData;
            
            if (timeType === 'day') {
                // 日：x轴为时间点（24小时）
                labels = [];
                chargingData = [];
                dischargingData = [];
                revenueData = [];
                for (let i = 0; i < 24; i += 2) {
                    labels.push(`${i.toString().padStart(2, '0')}:00`);
                    // 夜间充电多，白天放电多
                    const charging = (i >= 22 || i <= 6) ? 15 + Math.random() * 20 : 5 + Math.random() * 10;
                    const discharging = (i >= 8 && i <= 18) ? 20 + Math.random() * 25 : 8 + Math.random() * 12;
                    const revenue = discharging * 0.8 - charging * 0.6 + Math.random() * 50;
                    chargingData.push(charging);
                    dischargingData.push(discharging);
                    revenueData.push(revenue);
                }
            } else if (timeType === 'month') {
                // 月：x轴为天（1-30天）
                labels = [];
                chargingData = [];
                dischargingData = [];
                revenueData = [];
                for (let day = 1; day <= 30; day += 3) {
                    labels.push(`${day}日`);
                    const charging = 300 + Math.random() * 200;
                    const discharging = 280 + Math.random() * 180;
                    const revenue = discharging * 0.8 - charging * 0.6 + Math.random() * 100;
                    chargingData.push(charging);
                    dischargingData.push(discharging);
                    revenueData.push(revenue);
                }
            } else if (timeType === 'year') {
                // 年：x轴为月（1-12月）
                labels = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
                chargingData = [3200, 2800, 3500, 3800, 4200, 4500, 4800, 4600, 4000, 3600, 3200, 2900];
                dischargingData = [3000, 2600, 3300, 3600, 4000, 4300, 4600, 4400, 3800, 3400, 3000, 2700];
                revenueData = [8500, 7200, 9800, 11200, 13500, 14800, 16200, 15500, 12800, 10500, 8200, 7800];
            } else { // total 合计
                // 合计：x轴为年（多年对比）
                labels = ['2021年', '2022年', '2023年', '2024年', '2025年'];
                chargingData = [32000, 38000, 42000, 45000, 48000];
                dischargingData = [30000, 36000, 40000, 42500, 45500];
                revenueData = [85000, 105000, 125000, 135000, 148000];
            }
            
            return { labels, chargingData, dischargingData, revenueData };
        }

        function updateRevenueAnalysisChart() {
            const timeType = document.getElementById('revenueTimeType').value;
            const datePickerWrapper = document.getElementById('revenueDatePickerWrapper');
            const datePicker = document.getElementById('revenueDatePicker');
            const monthPicker = document.getElementById('revenueMonthPicker');
            const yearPicker = document.getElementById('revenueYearPicker');
            
            // 隐藏所有选择器
            datePickerWrapper.style.display = 'none';
            monthPicker.style.display = 'none';
            yearPicker.style.display = 'none';
            
            // 根据时间类型显示对应的选择器并设置默认值
            const today = new Date();
            switch(timeType) {
                case 'day':
                    datePickerWrapper.style.display = 'inline-block';
                    // 设置默认为今日
                    if (!datePicker.value) {
                        datePicker.value = today.toISOString().split('T')[0];
                    }
                    break;
                case 'month':
                    monthPicker.style.display = 'block';
                    // 设置默认为本月
                    if (!monthPicker.value) {
                        const year = today.getFullYear();
                        const month = (today.getMonth() + 1).toString().padStart(2, '0');
                        monthPicker.value = `${year}-${month}`;
                    }
                    break;
                case 'year':
                    yearPicker.style.display = 'block';
                    break;
                case 'total':
                    // 合计不需要额外选择器
                    break;
            }
            
            initRevenueAnalysisChart();
        }

        // 页面初始化
        window.onload = function() {
            try {
                console.log('Data page initializing...');
                
                // 检查登录状态 - 暂时注释掉用于调试
                // const user = localStorage.getItem('touchscreen_user') || sessionStorage.getItem('touchscreen_user');
                // if (!user) {
                //     window.location.href = 'login.html';
                //     return;
                // }

                // 应用语言设置
                applyLanguage(currentLang);
                
                // 设置语言选项的激活状态
                document.querySelectorAll('.lang-option').forEach(option => {
                    const isCurrentLang = option.getAttribute('onclick').includes(`'${currentLang}'`);
                    if (isCurrentLang) {
                        option.classList.add('active');
                    } else {
                        option.classList.remove('active');
                    }
                });

                // 更新时间
                updateTime();
                setInterval(updateTime, 1000);
                
                // 确保有默认激活的标签页
                const firstComponent = document.querySelector('.component-item');
                const firstSection = document.querySelector('.content-section');
                if (firstComponent && !document.querySelector('.component-item.active')) {
                    firstComponent.classList.add('active');
                }
                if (firstSection && !document.querySelector('.content-section.active')) {
                    firstSection.classList.add('active');
                }

                // 初始化所有组件的实时数据
                const components = ['overall', 'ems', 'pcs', 'bms', 'thermal', 'fire'];
                
                // 首先确保整机概览是显示状态并渲染数据
                setTimeout(() => {
                    console.log('Initializing component data...');
                    components.forEach(component => {
                        try {
                            renderComponentData(component);
                        } catch (err) {
                            console.error(`Error rendering ${component}:`, err);
                        }
                    });
                    
                    // 确保第一个组件的数据已渲染
                    const overallSection = document.getElementById('overallSection');
                    if (overallSection && overallSection.classList.contains('active')) {
                        console.log('Overall section is active and data should be visible');
                    }
                }, 100);
                
                // 定时更新数据值（每2秒更新一次）
                setInterval(() => {
                    try {
                        // 只更新当前显示的组件
                        const activeSection = document.querySelector('.content-section.active');
                        if (activeSection) {
                            const componentId = activeSection.id.replace('Section', '');
                            updateDataValues(componentId);
                        }
                    } catch (err) {
                        console.error('Error updating data values:', err);
                    }
                }, 2000);
                
                // 检查URL参数，自动选中对应的tab
                const urlParams = new URLSearchParams(window.location.search);
                const tabParam = urlParams.get('tab');
                if (tabParam) {
                    // 延迟执行以确保页面完全加载
                    setTimeout(() => {
                        try {
                            switchDataTab(tabParam);
                        } catch (err) {
                            console.error('Error switching tab:', err);
                        }
                    }, 100);
                }
                
                // 延迟自动初始化历史数据
                setTimeout(() => {
                    try {
                        autoInitHistoryData();
                    } catch (err) {
                        console.error('Error initializing history data:', err);
                    }
                }, 500);
                
                console.log('Data page initialization complete');
            } catch (error) {
                console.error('Critical error during initialization:', error);
            }

            // 点击其他地方关闭下拉菜单
            document.addEventListener('click', function(e) {
                const langSwitcher = document.querySelector('.lang-switcher');
                if (langSwitcher && !langSwitcher.contains(e.target)) {
                    document.getElementById('langDropdown').classList.remove('show');
                }
            });
            
            // 添加事件委托，确保动态内容的事件也能正常工作
            document.addEventListener('click', function(e) {
                // 处理组件切换
                if (e.target.classList.contains('component-item')) {
                    const onclick = e.target.getAttribute('onclick');
                    if (onclick && onclick.includes('switchDataTab')) {
                        const match = onclick.match(/switchDataTab\('(.+?)'\)/);
                        if (match) {
                            console.log('Switching to component:', match[1]);
                            switchDataTab(match[1]);
                        }
                    }
                }
                
                // 处理子标签切换（实时数据/历史数据）
                if (e.target.classList.contains('sub-tab')) {
                    const onclick = e.target.getAttribute('onclick');
                    if (onclick && onclick.includes('switchSubTab')) {
                        const match = onclick.match(/switchSubTab\('(.+?)',\s*'(.+?)'\)/);
                        if (match) {
                            console.log('Switching sub tab:', match[1], match[2]);
                            switchSubTab(match[1], match[2]);
                        }
                    }
                }
                
                // 处理自定义按钮
                if (e.target.classList.contains('data-settings-btn') || e.target.parentElement?.classList.contains('data-settings-btn')) {
                    const btn = e.target.classList.contains('data-settings-btn') ? e.target : e.target.parentElement;
                    const onclick = btn.getAttribute('onclick');
                    if (onclick && onclick.includes('openSettings')) {
                        const match = onclick.match(/openSettings\('(.+?)'\)/);
                        if (match) {
                            console.log('Opening settings for:', match[1]);
                            openSettings(match[1]);
                        }
                    }
                }
            });
        };
        
        // 将函数暴露到全局作用域，确保内联事件处理器可以访问
        window.switchDataTab = switchDataTab;
        window.switchSubTab = switchSubTab;
        window.openSettings = openSettings;
        window.closeSettings = closeSettings;
        window.changeHistoryRange = changeHistoryRange;
        window.switchSettingsType = switchSettingsType;
        window.toggleLanguageDropdown = toggleLanguageDropdown;
        window.changeLanguage = changeLanguage;
        window.logout = logout;
        window.closeConfirmDialog = closeConfirmDialog;
        window.confirmLogout = confirmLogout;
        
        // 强制初始化函数
        window.forceInitialize = function() {
            console.log('Force initializing data page...');
            
            // 确保有激活的组件
            const firstComponent = document.querySelector('.component-item');
            const firstSection = document.querySelector('.content-section');
            if (firstComponent) {
                firstComponent.classList.add('active');
            }
            if (firstSection) {
                firstSection.classList.add('active');
                firstSection.style.display = 'flex';
            }
            
            // 确保有激活的子内容
            const firstSubContent = document.querySelector('.sub-content');
            if (firstSubContent) {
                firstSubContent.classList.add('active');
                firstSubContent.style.display = 'block';
            }
            
            // 渲染所有组件数据
            const components = ['overall', 'ems', 'pcs', 'bms', 'battery', 'thermal', 'fire'];
            components.forEach(component => {
                try {
                    renderComponentData(component);
                } catch (err) {
                    console.error(`Error rendering ${component}:`, err);
                }
            });
            
            console.log('Force initialization complete');
        };

            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 100) progress = 100;
                
                document.getElementById('otaProgressFill').style.width = progress + '%';
                document.getElementById('otaProgressPercent').textContent = Math.floor(progress) + '%';
                
                // 更新状态文本
                const statusIndex = Math.floor((progress / 100) * (statusTexts.length - 1));
                document.getElementById('otaStatusText').textContent = statusTexts[statusIndex];
                
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        alert('固件升级成功！系统将在3秒后重启...');
                        setTimeout(() => {
                            closeOTAModal();
                        }, 3000);
                    }, 500);
                }
            }, 500);
        }
    </script>

    <script>
        // 滚动页面功能
        function scrollPage(direction) {
            const scrollAmount = 300; // 每次滚动300像素
            
            // 首先查找当前激活的主内容区域
            const activeSection = document.querySelector('.content-section.active');
            
            if (activeSection) {
                // 在激活的主区域内查找激活的子内容
                const activeContent = activeSection.querySelector('.sub-content.active');
                
                if (activeContent) {
                    // 如果有激活的子内容区域，滚动它
                    if (direction === 'up') {
                        activeContent.scrollBy({
                            top: -scrollAmount,
                            behavior: 'smooth'
                        });
                    } else if (direction === 'down') {
                        activeContent.scrollBy({
                            top: scrollAmount,
                            behavior: 'smooth'
                        });
                    }
                } else {
                    // 如果没有子内容，尝试滚动主区域
                    if (direction === 'up') {
                        activeSection.scrollBy({
                            top: -scrollAmount,
                            behavior: 'smooth'
                        });
                    } else if (direction === 'down') {
                        activeSection.scrollBy({
                            top: scrollAmount,
                            behavior: 'smooth'
                        });
                    }
                }
            } else {
                // 如果没有激活的区域，滚动整个窗口
                if (direction === 'up') {
                    window.scrollBy({
                        top: -scrollAmount,
                        behavior: 'smooth'
                    });
                } else if (direction === 'down') {
                    window.scrollBy({
                        top: scrollAmount,
                        behavior: 'smooth'
                    });
                }
            }
        }
    </script>

    <script>
        // 自定义日历相关变量
        let currentCalendarInput = null;
        let selectedDate = new Date();
        let displayMonth = new Date();
        
        // 显示自定义日历
        function showCustomCalendar(inputId) {
            currentCalendarInput = document.getElementById(inputId);
            const popup = document.getElementById('customCalendarPopup');
            const inputRect = currentCalendarInput.getBoundingClientRect();
            
            // 获取当前输入框的值，如果有的话
            const currentValue = currentCalendarInput.value;
            if (currentValue) {
                selectedDate = new Date(currentValue);
                displayMonth = new Date(currentValue);
            } else {
                selectedDate = new Date();
                displayMonth = new Date();
            }
            
            // 初始化年份选项
            const yearSelect = document.getElementById('calendarYear');
            yearSelect.innerHTML = '';
            const currentYear = new Date().getFullYear();
            for (let year = currentYear - 5; year <= currentYear + 5; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year + '年';
                if (year === displayMonth.getFullYear()) {
                    option.selected = true;
                }
                yearSelect.appendChild(option);
            }
            
            // 设置月份
            document.getElementById('calendarMonth').value = displayMonth.getMonth();
            
            // 显示遮罩层
            let overlay = document.getElementById('calendarOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'calendarOverlay';
                overlay.className = 'calendar-overlay';
                document.body.appendChild(overlay);
                overlay.onclick = closeCustomCalendar;
            }
            overlay.classList.add('show');
            
            // 居中显示弹窗
            popup.classList.add('show');
            
            updateCalendar();
        }
        
        // 关闭自定义日历
        function closeCustomCalendar() {
            document.getElementById('customCalendarPopup').classList.remove('show');
            const overlay = document.getElementById('calendarOverlay');
            if (overlay) {
                overlay.classList.remove('show');
            }
        }
        
        // 更新日历显示
        function updateCalendar() {
            const month = parseInt(document.getElementById('calendarMonth').value);
            const year = parseInt(document.getElementById('calendarYear').value);
            displayMonth = new Date(year, month, 1);
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const prevLastDay = new Date(year, month, 0);
            
            const daysContainer = document.getElementById('calendarDays');
            daysContainer.innerHTML = '';
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            // 添加上月的日期
            const firstDayOfWeek = firstDay.getDay();
            for (let i = firstDayOfWeek - 1; i >= 0; i--) {
                const day = prevLastDay.getDate() - i;
                const dayDiv = createDayElement(day, true, new Date(year, month - 1, day));
                daysContainer.appendChild(dayDiv);
            }
            
            // 添加本月的日期
            for (let day = 1; day <= lastDay.getDate(); day++) {
                const currentDate = new Date(year, month, day);
                const dayDiv = createDayElement(day, false, currentDate);
                
                // 标记今天
                if (currentDate.getTime() === today.getTime()) {
                    dayDiv.classList.add('today');
                }
                
                // 标记选中的日期
                if (selectedDate && 
                    currentDate.getDate() === selectedDate.getDate() &&
                    currentDate.getMonth() === selectedDate.getMonth() &&
                    currentDate.getFullYear() === selectedDate.getFullYear()) {
                    dayDiv.classList.add('selected');
                }
                
                daysContainer.appendChild(dayDiv);
            }
            
            // 添加下月的日期
            const remainingDays = 42 - daysContainer.children.length;
            for (let day = 1; day <= remainingDays; day++) {
                const dayDiv = createDayElement(day, true, new Date(year, month + 1, day));
                daysContainer.appendChild(dayDiv);
            }
        }
        
        // 创建日期元素
        function createDayElement(day, isOtherMonth, date) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'calendar-day';
            dayDiv.textContent = day;
            
            if (isOtherMonth) {
                dayDiv.classList.add('other-month');
            }
            
            dayDiv.onclick = function() {
                selectedDate = date;
                confirmDate();
            };
            
            return dayDiv;
        }
        
        // 切换月份
        function changeMonth(direction) {
            const month = parseInt(document.getElementById('calendarMonth').value);
            const year = parseInt(document.getElementById('calendarYear').value);
            
            let newMonth = month + direction;
            let newYear = year;
            
            if (newMonth < 0) {
                newMonth = 11;
                newYear--;
            } else if (newMonth > 11) {
                newMonth = 0;
                newYear++;
            }
            
            document.getElementById('calendarMonth').value = newMonth;
            document.getElementById('calendarYear').value = newYear;
            
            updateCalendar();
        }
        
        // 设置为今天
        function setToday() {
            selectedDate = new Date();
            displayMonth = new Date();
            document.getElementById('calendarMonth').value = displayMonth.getMonth();
            document.getElementById('calendarYear').value = displayMonth.getFullYear();
            confirmDate();
        }
        
        // 确认选择
        function confirmDate() {
            if (currentCalendarInput && selectedDate) {
                const year = selectedDate.getFullYear();
                const month = (selectedDate.getMonth() + 1).toString().padStart(2, '0');
                const day = selectedDate.getDate().toString().padStart(2, '0');
                currentCalendarInput.value = `${year}-${month}-${day}`;
                
                // 触发更新事件
                if (currentCalendarInput.id === 'historyEndDatePicker') {
                    updateHistoryChart();
                } else if (currentCalendarInput.id === 'revenueDatePicker') {
                    updateRevenueAnalysisChart();
                }
            }
            closeCustomCalendar();
        }
        
        // 点击外部关闭日历
        document.addEventListener('click', function(e) {
            const popup = document.getElementById('customCalendarPopup');
            const isClickInside = popup.contains(e.target) || 
                                  e.target.classList.contains('calendar-icon') ||
                                  (currentCalendarInput && currentCalendarInput.contains(e.target));
            
            if (!isClickInside && popup.classList.contains('show')) {
                closeCustomCalendar();
            }
        });
    </script>
