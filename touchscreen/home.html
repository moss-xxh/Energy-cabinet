<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>储能柜管理系统 - 首页</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="common-header-styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0e1a;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* 科技风背景网格 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 150, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* 动态光效背景 */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 0;
        }

        .bg-effects::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.15) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
            top: -50%;
            left: -50%;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 头部导航 */
        .header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            position: relative;
            z-index: 100;
            gap: 40px;
        }

        /* Logo区域 */
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: none;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(90deg, #0096ff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 导航菜单 */
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            justify-content: center;
        }

        .nav-item {
            padding: 8px 20px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 15px;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
            border-radius: 8px;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-item:hover {
            color: #00d4ff;
            background: rgba(0, 150, 255, 0.1);
        }

        .nav-item:hover::before {
            width: 80%;
        }

        .nav-item.active {
            color: #00d4ff;
            background: rgba(0, 150, 255, 0.15);
        }

        .nav-item.active::before {
            width: 80%;
            background: #00d4ff;
            box-shadow: 0 0 10px #00d4ff;
        }

        /* 头部右侧 */
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* 时间显示 */
        .header-time {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-family: 'SF Mono', monospace;
            letter-spacing: 1px;
        }

        /* 科技风图标按钮 */
        .tech-icon-btn {
            width: 40px;
            height: 40px;
            background: rgba(0, 150, 255, 0.1);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tech-icon-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.6) 0%, transparent 70%);
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
        }

        .tech-icon-btn:hover {
            background: rgba(0, 150, 255, 0.2);
            border-color: rgba(0, 150, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 150, 255, 0.4);
        }

        .tech-icon-btn:hover::before {
            width: 100px;
            height: 100px;
        }

        .tech-icon-btn:active {
            transform: translateY(0);
        }

        /* 图标样式 */
        .tech-icon {
            width: 20px;
            height: 20px;
            position: relative;
            z-index: 1;
        }

        /* 语言切换图标 */
        .lang-icon {
            width: 20px;
            height: 20px;
            border: 2px solid #00d4ff;
            border-radius: 50%;
            position: relative;
        }

        .lang-icon::before,
        .lang-icon::after {
            content: '';
            position: absolute;
            border: 1px solid #00d4ff;
            border-radius: 50%;
        }

        .lang-icon::before {
            width: 100%;
            height: 8px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .lang-icon::after {
            width: 8px;
            height: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 退出图标 */
        .logout-icon {
            width: 20px;
            height: 20px;
            position: relative;
        }

        .logout-icon::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid #00d4ff;
            border-right: none;
            border-radius: 2px 0 0 2px;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        .logout-icon::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 2px;
            background: #00d4ff;
            right: 2px;
            top: 50%;
            transform: translateY(-50%);
        }

        .logout-icon .arrow {
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 4px 0 4px 6px;
            border-color: transparent transparent transparent #00d4ff;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        /* 主内容区域 */
        .main-content {
            height: calc(100vh - 60px);
            position: relative;
            z-index: 1;
            padding: 20px 10px 10px 10px;
            overflow-y: auto;
        }

        /* 首页特定样式 */
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .dashboard-section {
            margin-bottom: 10px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            font-size: 24px;
        }

        /* 概览卡片网格 */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .overview-card {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.8), rgba(30, 41, 59, 0.8));
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .overview-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 212, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0, 150, 255, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
        }

        .card-icon {
            font-size: 24px;
            color: #00d4ff;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .card-unit {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-left: 5px;
        }



        .status-warning {
            background: rgba(255, 165, 0, 0.2);
            color: #ffa500;
            border: 1px solid rgba(255, 165, 0, 0.3);
        }


        /* 图表容器 */
        .chart-section {
            margin-bottom: 30px;
        }

        .chart-container {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.8), rgba(30, 41, 59, 0.8));
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .chart-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
        }

        .chart-wrapper {
            height: 300px;
            width: 100%;
        }

        /* 组件状态网格 */
        .components-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .component-card {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.8), rgba(30, 41, 59, 0.8));
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .component-card:hover {
            transform: translateY(-3px);
            border-color: rgba(0, 212, 255, 0.6);
            box-shadow: 0 8px 25px rgba(0, 150, 255, 0.2);
        }

        .component-icon {
            font-size: 24px;
            color: #00d4ff;
            margin-bottom: 8px;
        }

        .component-name {
            font-size: 12px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 6px;
        }


        /* 快捷操作 */
        .quick-actions {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(145deg, #00d4ff, #0096ff);
            border: none;
            color: #ffffff;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 150, 255, 0.4);
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 150, 255, 0.6);
        }


        /* 工具提示 */
        .tooltip {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .tech-icon-btn:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        /* 能量流图样式 */
        .energy-flow-card {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.8), rgba(30, 41, 59, 0.8));
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .energy-metrics-container {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 40px;
            align-items: stretch;
            height: 600px;
        }

        .energy-flow-diagram {
            position: relative;
            height: 100%;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border: 1px solid rgba(0, 150, 255, 0.2);
        }

        /* 右侧统计数据容器 */
        .energy-stats {
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: 100%;
        }

        /* 能量统计区块样式 */
        .energy-section {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0, 150, 255, 0.2);
            flex: 1;
        }

        .energy-section h3 {
            margin: 0 0 12px 0;
            font-size: 1.125rem;
            font-weight: 600;
            color: #00d4ff;
        }

        .energy-metrics {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .energy-metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .energy-metric-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .energy-metric-value {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .energy-metric-value.revenue {
            color: #10b981;
        }

        /* 组件样式 */
        .flow-component {
            position: absolute;
            text-align: center;
            z-index: 10;
        }

        .flow-component img {
            width: 96px;
            height: 96px;
            object-fit: contain;
        }

        .component-label {
            margin-top: 8px;
            padding: 6px 16px;
            background: #0096ff;
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            display: inline-block;
        }

        /* 组件位置 */
        .flow-component.pv {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .flow-component.load {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .flow-component.storage {
            bottom: 20px;
            left: calc(15% - 80px);
        }

        .flow-component.grid {
            bottom: 70px;
            right: calc(15% - 90px);
        }

        /* 电池电量指示器 */
        .battery-indicator {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .battery-icon {
            width: 60px;
            height: 30px;
            border: 2px solid #64748b;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .battery-icon::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 12px;
            background: #64748b;
            border-radius: 0 2px 2px 0;
        }

        .battery-level {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: #10b981;
            transition: width 0.5s ease, background 0.5s ease;
        }

        .battery-text {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        /* 能量流动线 */
        .energy-flow-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        /* 右侧统计数据容器 */
        .energy-stats {
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: 100%;
        }

        /* 能量统计区块样式 */
        .energy-section {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0, 150, 255, 0.2);
            flex: 1;
        }

        .energy-section h3 {
            margin: 0 0 12px 0;
            font-size: 1.125rem;
            font-weight: 600;
            color: #00d4ff;
        }

        .energy-metrics {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .energy-metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .energy-metric-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .energy-metric-value {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .energy-metric-value.revenue {
            color: #10b981;
        }

        /* 新布局样式 */
        .top-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
            height: 350px;
        }

        .top-card {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.8), rgba(30, 41, 59, 0.8));
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 12px;
            padding: 0;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .card-title-bar {
            background: rgba(0, 150, 255, 0.1);
            padding: 12px 16px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00d4ff;
            font-weight: 600;
            font-size: 14px;
        }

        /* 系统组件状态样式 - 简洁卡片设计 */
        .components-compact {
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 12px;
            height: 100%;
            overflow: visible;
        }

        .component-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(0, 150, 255, 0.15);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            text-align: center;
            height: auto;
        }

        .component-item:hover {
            background: rgba(0, 150, 255, 0.08);
            border-color: rgba(0, 150, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 150, 255, 0.15);
        }

        .component-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 150, 255, 0.1));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0, 150, 255, 0.2);
            margin-bottom: 10px;
        }

        .component-icon i {
            font-size: 16px;
            color: #00d4ff;
        }

        .component-name {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.2;
            margin-top: 2px;
        }

        .component-status {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1;
        }

        .status-normal {
            color: #4ade80;
        }

        .status-error {
            color: #f87171;
        }


        /* 特殊处理最后一行只有一个项目的情况 */
        .component-item:last-child:nth-child(odd) {
            grid-column: 1 / -1;
            max-width: calc(50% - 6px);
            justify-self: start;
        }

        /* 能量图紧凑样式 */
        .energy-card {
            position: relative;
        }

        .energy-flow-diagram-compact {
            position: relative;
            height: 100%;
            padding: 10px;
        }

        .energy-flow-svg-compact {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .flow-component-compact {
            position: absolute;
            text-align: center;
            z-index: 10;
        }

        .flow-component-compact img {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }

        .component-label-compact {
            margin-top: 4px;
            padding: 2px 8px;
            background: #0096ff;
            color: white;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 500;
            display: inline-block;
        }

        .flow-component-compact.pv {
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .flow-component-compact.load {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .flow-component-compact.storage {
            bottom: 30px;
            left: calc(20% - 70px);
        }

        .flow-component-compact.grid {
            bottom: 50px;
            right: calc(20% - 60px);
        }

        .battery-indicator-compact {
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: center;
        }

        .battery-icon-compact {
            width: 30px;
            height: 15px;
            border: 1px solid #64748b;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .battery-icon-compact::after {
            content: '';
            position: absolute;
            right: -2px;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 6px;
            background: #64748b;
            border-radius: 0 1px 1px 0;
        }

        .battery-level-compact {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: #10b981;
            transition: width 0.5s ease;
        }

        .battery-text-compact {
            font-size: 10px;

        /* 数据统计网格样式 */
        .data-stats-compact {
            padding: 16px;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);

        .stat-item {

        /* 下部分图表样式 */
        .bottom-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            height: 270px;

        .bottom-chart {

            border-radius: 12px;

            backdrop-filter: blur(10px);

        .bottom-chart .chart-wrapper {
            height: 200px;

        /* 响应式设计 */
        @media (max-width: 1200px) {

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script>


        // 功率趋势图表
        let powerTrendChart = null;
        
        // 生成功率趋势数据
        function generatePowerTrendData() {
            // 生成一天24小时的数据
            const labels = [];
            const powerData = [];
            const socData = [];
            
            for (let i = 0; i < 24; i++) {
                labels.push(`${i.toString().padStart(2, '0')}:00`);
                // 白天功率高，夜间功率低
                const basePower = (i >= 6 && i <= 18) ? 150 + Math.random() * 100 : 50 + Math.random() * 50;
                const baseSoc = 70 + Math.random() * 30;
                powerData.push(basePower);
                socData.push(baseSoc);
            }
            
            return { labels, powerData, socData };
        }
        
        function initPowerTrendChart() {
            const ctx = document.getElementById('powerTrendChart');
            if (!ctx) return;

            if (powerTrendChart) {
                powerTrendChart.destroy();
            }

            // 设置默认日期为当天
            const today = new Date();
            const datePicker = document.getElementById('powerDatePicker');
            
            if (datePicker && !datePicker.value) {
                datePicker.value = today.toISOString().split('T')[0];
            }

            // 获取数据
            const { labels, powerData, socData } = generatePowerTrendData();

            powerTrendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '功率 (kW)',
                        data: powerData,
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0, 212, 255, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }, {
                        label: 'SOC (%)',
                        data: socData,
                        borderColor: '#00ff00',
                        backgroundColor: 'rgba(0, 255, 0, 0.1)',
                        borderWidth: 2,
                        fill: false,
                        tension: 0.4,
                        yAxisID: 'y1'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false, // 禁用动画避免加载闪烁
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                color: 'rgba(255, 255, 255, 0.7)'
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.5)'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.5)'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.5)'
                            },
                            grid: {
                                drawOnChartArea: false,
                            }
                        }
                    }
                }
            });

            // 图表创建完成后显示
            setTimeout(() => {
                ctx.style.opacity = '1';
            }, 50);
        }

        // 更新功率趋势图表
        function updatePowerTrendChart() {
            initPowerTrendChart();
        }

        // 收益分析图表初始化
        function initRevenueAnalysisChart() {
            const ctx = document.getElementById('revenueAnalysisChart');
            if (!ctx) return;
            
            // 设置默认日期值
            const today = new Date();
            const datePicker = document.getElementById('revenueDatePicker');
            const monthPicker = document.getElementById('revenueMonthPicker');
            
            if (datePicker) {
                datePicker.value = today.toISOString().split('T')[0];
            }
            if (monthPicker) {
                const year = today.getFullYear();
                const month = (today.getMonth() + 1).toString().padStart(2, '0');
                monthPicker.value = `${year}-${month}`;
            }
            
            const timeType = document.getElementById('revenueTimeType')?.value || 'day';
            const { labels, chargingData, dischargingData, revenueData } = generateRevenueData(timeType);
            
            new Chart(ctx.getContext('2d'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '充电量 (kWh)',
                        data: chargingData,
                        backgroundColor: 'rgba(16, 185, 129, 0.8)',
                        borderColor: '#10b981',
                        borderWidth: 1,
                        yAxisID: 'y'
                    }, {
                        label: '放电量 (kWh)',
                        data: dischargingData,
                        backgroundColor: 'rgba(239, 68, 68, 0.8)',
                        borderColor: '#ef4444',
                        borderWidth: 1,
                        yAxisID: 'y'
                    }, {
                        label: '净收益 (¥)',
                        data: revenueData,
                        type: 'line',
                        backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        borderColor: '#f59e0b',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: false,
                        yAxisID: 'y1'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false, // 禁用动画避免加载闪烁
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                padding: 20,
                                color: 'rgba(255, 255, 255, 0.7)'
                            }
                        }
                    },
                    scales: {
                        x: {
                            display: true,
                            grid: {
                                drawOnChartArea: false,
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.5)'
                            }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '电量 (kWh)',
                                color: 'rgba(255, 255, 255, 0.7)'
                            },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.5)'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '收益 (¥)',
                                color: 'rgba(255, 255, 255, 0.7)'
                            },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.5)'
                            },
                            grid: {
                                drawOnChartArea: false,
                            }
                        }
                    }
                }
            });

            // 图表创建完成后显示
            setTimeout(() => {
                ctx.style.opacity = '1';
            }, 50);
        }

        // 生成收益数据
        function generateRevenueData(timeType) {
            let labels, chargingData, dischargingData, revenueData;
            
            if (timeType === 'day') {
                // 日：x轴为时间点（24小时）
                labels = [];
                chargingData = [];
                dischargingData = [];
                revenueData = [];
                for (let i = 0; i < 24; i += 2) {
                    labels.push(`${i.toString().padStart(2, '0')}:00`);
                    // 夜间充电多，白天放电多
                    const charging = (i >= 22 || i <= 6) ? 15 + Math.random() * 20 : 5 + Math.random() * 10;
                    const discharging = (i >= 8 && i <= 18) ? 20 + Math.random() * 25 : 8 + Math.random() * 12;
                    const revenue = discharging * 0.8 - charging * 0.6 + Math.random() * 50;
                    chargingData.push(charging);
                    dischargingData.push(discharging);
                    revenueData.push(revenue);
                }
            } else if (timeType === 'month') {
                // 月：x轴为天（1-30天）
                labels = [];
                chargingData = [];
                dischargingData = [];
                revenueData = [];
                for (let day = 1; day <= 30; day += 3) {
                    labels.push(`${day}日`);
                    const charging = 300 + Math.random() * 200;
                    const discharging = 280 + Math.random() * 180;
                    const revenue = discharging * 0.8 - charging * 0.6 + Math.random() * 100;
                    chargingData.push(charging);
                    dischargingData.push(discharging);
                    revenueData.push(revenue);
                }
            } else if (timeType === 'year') {
                // 年：x轴为月（1-12月）
                labels = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
                chargingData = [3200, 2800, 3500, 3800, 4200, 4500, 4800, 4600, 4000, 3600, 3200, 2900];
                dischargingData = [3000, 2600, 3300, 3600, 4000, 4300, 4600, 4400, 3800, 3400, 3000, 2700];
                revenueData = [8500, 7200, 9800, 11200, 13500, 14800, 16200, 15500, 12800, 10500, 8200, 7800];
            } else { // total 合计
                // 合计：x轴为年（多年对比）
                labels = ['2021年', '2022年', '2023年', '2024年', '2025年'];
                chargingData = [32000, 38000, 42000, 45000, 48000];
                dischargingData = [30000, 36000, 40000, 42500, 45500];
                revenueData = [85000, 105000, 125000, 135000, 148000];
            }
            
            return { labels, chargingData, dischargingData, revenueData };
        }

        // 更新收益分析图表
        function updateRevenueAnalysisChart() {
            const timeType = document.getElementById('revenueTimeType').value;
            const datePicker = document.getElementById('revenueDatePicker');
            const monthPicker = document.getElementById('revenueMonthPicker');
            const yearPicker = document.getElementById('revenueYearPicker');
            
            // 隐藏所有选择器
            datePicker.style.display = 'none';
            monthPicker.style.display = 'none';
            yearPicker.style.display = 'none';
            
            // 根据时间类型显示对应的选择器并设置默认值
            const today = new Date();
            switch(timeType) {
                case 'day':
                    datePicker.style.display = 'block';
                    // 设置默认为今日
                    if (!datePicker.value) {
                        datePicker.value = today.toISOString().split('T')[0];
                    }
                    break;
                case 'month':
                    monthPicker.style.display = 'block';
                    // 设置默认为本月
                    if (!monthPicker.value) {
                        const year = today.getFullYear();
                        const month = (today.getMonth() + 1).toString().padStart(2, '0');
                        monthPicker.value = `${year}-${month}`;
                    }
                    break;
                case 'year':
                    yearPicker.style.display = 'block';
                    break;
                case 'total':
                    // 合计不需要额外选择器
                    break;
            }
            
            initRevenueAnalysisChart();
        }

        // 组件导航
        function navigateToComponent(component) {
            window.location.href = `data.html?tab=${component}`;
        }

        // 更新时间
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('currentTime').textContent = timeStr;
        }

        // 切换语言下拉菜单
        function toggleLanguage(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('langDropdown');
            dropdown.classList.toggle('show');
        }

        // 选择语言
        function selectLanguage(lang, event) {
            event.stopPropagation();
            
            // 更新选中状态
            document.querySelectorAll('.lang-option').forEach(option => {
                option.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 保存语言设置
            localStorage.setItem('touchscreen_lang', lang);
            
            // 关闭下拉菜单
            document.getElementById('langDropdown').classList.remove('show');
            
            // 这里可以添加语言切换逻辑
            console.log('切换语言到:', lang);
        }

        // 点击其他地方关闭下拉菜单
        document.addEventListener('click', function(e) {
            const langBtn = document.querySelector('.tech-icon-btn');
            if (!langBtn.contains(e.target)) {
                document.getElementById('langDropdown').classList.remove('show');
            }
        });

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('touchscreen_user');
                sessionStorage.removeItem('touchscreen_user');
                window.location.href = 'login.html';
            }
        }

        // 切换页面
        function switchPage(page) {
            // 更新活动菜单项
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 页面跳转
            if (page === 'home') {
                // 首页：不进行任何跳转，只更新活动状态
                return false;
            } else if (page === 'data') {
                window.location.href = 'data.html';
            } else if (page === 'control') {
                window.location.href = 'control.html';
            } else if (page === 'alarm') {
                window.location.href = 'alarm.html';
            } else if (page === 'log') {
                window.location.href = 'logs.html';
            } else if (page === 'settings') {
                window.location.href = 'settings.html';
            }
        }

        // 页面加载完成后初始化
        // 提前检查登录状态，避免页面加载后的跳转
        (function() {
            const user = localStorage.getItem('touchscreen_user') || sessionStorage.getItem('touchscreen_user');
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            // 标记页面已准备好，避免加载动画
            document.documentElement.setAttribute('data-page-ready', 'true');
        })();

        window.onload = function() {
            // 更新时间
            updateTime();
            setInterval(updateTime, 1000);

            // 使用requestAnimationFrame确保DOM完全就绪后再初始化
            requestAnimationFrame(() => {
                // 立即初始化能量流图（轻量级组件）
                initEnergyFlowDiagramCompact();
            });

            // 延迟初始化图表，避免阻塞页面渲染
            setTimeout(() => {
                initPowerTrendChart();
            }, 200);
            
            setTimeout(() => {
                initRevenueAnalysisChart();
            }, 400);
        };

        // 创建紧凑版能量流向连线
        function createEnergyFlowLinesCompact() {
            const svg = document.getElementById('energy-flow-svg-compact');
            if (!svg) {
                return;
            }
            
            // 设置SVG内容
            svg.setAttribute('viewBox', '0 0 400 250');
            svg.innerHTML = `
                <!-- 光伏到负载 - 垂直直线 -->
                <line x1="200" y1="20" x2="200" y2="120" stroke="rgba(0, 150, 255, 0.3)" stroke-width="3" />
                
                <!-- 光伏左侧到储能柜 - 先水平再垂直带圆角 -->
                <path d="M 200,0 L 60,0 Q 50,0 50,10 L 50,190" 
                      stroke="rgba(0, 150, 255, 0.3)" stroke-width="3" fill="none" />
                
                <!-- 光伏右侧到电网 - 先水平再垂直带圆角 -->
                <path d="M 200,0 L 340,0 Q 350,0 350,10 L 350,190" 
                      stroke="rgba(0, 150, 255, 0.3)" stroke-width="3" fill="none" />
                
                <!-- 负载到储能柜 - 先垂直再水平带圆角 -->
                <path d="M 190,130 L 190,190 Q 190,200 180,200 L 140,200 Q 130,200 130,200 L 80,200" 
                      stroke="rgba(0, 150, 255, 0.3)" stroke-width="3" fill="none" />
                
                <!-- 负载到电网 - 先垂直再水平带圆角 -->
                <path d="M 210,130 L 210,190 Q 210,200 220,200 L 270,200 Q 280,200 280,200 L 320,200" 
                      stroke="rgba(0, 150, 255, 0.3)" stroke-width="3" fill="none" />
                
                <!-- 储能柜到电网 - 基础水平连线 -->
                <line x1="80" y1="220" x2="320" y2="220" stroke="rgba(0, 150, 255, 0.3)" stroke-width="3" />
                
                <!-- 储能柜到电网 - 单个流动线段 -->
                <line x1="80" y1="220" x2="110" y2="220" stroke="#00ff00" stroke-width="4">
                    <animateTransform attributeName="transform" type="translate" 
                                    values="0,0; 240,0" dur="2s" repeatCount="indefinite" />
                    <animate attributeName="opacity" values="1;1;1;0" dur="2s" repeatCount="indefinite" 
                             keyTimes="0;0.8;0.9;1" />
                    <animate attributeName="stroke" values="#00ff00;#00d4ff" dur="2s" repeatCount="indefinite" />
                </line>
                
                <!-- 能量流动动画点 -->
                <circle r="3" fill="#00d4ff">
                    <animateMotion dur="2s" repeatCount="indefinite">
                        <path d="M 200 20 L 200 120"/>
                    </animateMotion>
                </circle>
                <circle r="3" fill="#00d4ff">
                    <animateMotion dur="2s" repeatCount="indefinite">
                        <path d="M 200,0 L 60,0 Q 50,0 50,10 L 50,190"/>
                    </animateMotion>
                </circle>
                <circle r="3" fill="#00d4ff">
                    <animateMotion dur="2s" repeatCount="indefinite">
                        <path d="M 200,0 L 340,0 Q 350,0 350,10 L 350,190"/>
                    </animateMotion>
                </circle>
                <circle r="3" fill="#00d4ff">
                    <animateMotion dur="2s" repeatCount="indefinite">
                        <path d="M 190,130 L 190,190 Q 190,200 180,200 L 140,200 Q 130,200 130,200 L 80,200"/>
                    </animateMotion>
                </circle>
                <circle r="3" fill="#00d4ff">
                    <animateMotion dur="2s" repeatCount="indefinite">
                        <path d="M 210,130 L 210,190 Q 210,200 220,200 L 270,200 Q 280,200 280,200 L 320,200"/>
                    </animateMotion>
                </circle>
                <!-- 储能柜到电网连线不需要额外的动画点，流动线段已足够表示馈电 -->
                <text x="200" y="250" fill="#00d4ff" font-size="18" font-weight="600" text-anchor="middle">2.1 kW</text>
            `;
        }




        // 初始化紧凑版能量流图
        function initEnergyFlowDiagramCompact() {
            // 立即创建能量流向连线，不使用延迟
            createEnergyFlowLinesCompact();
            
            // 启动数据更新
            updateEnergyFlowDataCompact();
            setInterval(updateEnergyFlowDataCompact, 5000);
            
            // 窗口大小改变时重新绘制连线
            window.addEventListener('resize', createEnergyFlowLinesCompact);
        }

        // 更新紧凑版能量流图数据
        function updateEnergyFlowDataCompact() {
            // 模拟动态数据
            const soc = Math.floor(Math.random() * 20 + 70); // 70-90%
            
            // 更新储能SOC
            const socDisplayEl = document.getElementById('soc-display-compact');
            if (socDisplayEl) {
                socDisplayEl.textContent = soc + '%';
            }
            const batteryLevel = document.getElementById('battery-level-compact');
            if (batteryLevel) {
                batteryLevel.style.width = soc + '%';
                
                // 根据电量设置颜色
                if (soc > 60) {
                    batteryLevel.style.background = '#10b981'; // 绿色
                } else if (soc > 30) {
                    batteryLevel.style.background = '#f59e0b'; // 橙色
                } else {
                    batteryLevel.style.background = '#ef4444'; // 红色
                }
            }
        }



    </script>
    <script src="common-header-scripts.js"></script>
</body>
