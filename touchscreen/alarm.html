<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>告警管理 - 储能柜管理系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="common-header-styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0e1a;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 科技风背景网格 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 150, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* 动态光效背景 */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 0;
        }

        .bg-effects::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.15) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
            top: -50%;
            left: -50%;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 头部导航 */
        .header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            gap: 40px;
        }

        /* Logo区域 */
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: none;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(90deg, #0096ff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 导航菜单 */
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            justify-content: center;
        }

        .nav-item {
            padding: 8px 20px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 15px;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
            border-radius: 8px;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-item:hover {
            color: #00d4ff;
            background: rgba(0, 150, 255, 0.1);
        }

        .nav-item:hover::before {
            width: 80%;
        }

        .nav-item.active {
            color: #00d4ff;
            background: rgba(0, 150, 255, 0.15);
        }

        .nav-item.active::before {
            width: 80%;
            background: #00d4ff;
            box-shadow: 0 0 10px #00d4ff;
        }

        /* 头部右侧 */
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* 时间显示 */
        .header-time {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-family: 'SF Mono', monospace;
            letter-spacing: 1px;
        }

        /* 科技风图标按钮 */
        .tech-icon-btn {
            width: 40px;
            height: 40px;
            background: rgba(0, 150, 255, 0.1);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tech-icon-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.6) 0%, transparent 70%);
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
        }

        .tech-icon-btn:hover {
            background: rgba(0, 150, 255, 0.2);
            border-color: rgba(0, 150, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 150, 255, 0.4);
        }

        .tech-icon-btn:hover::before {
            width: 100px;
            height: 100px;
        }

        .tech-icon-btn:active {
            transform: translateY(0);
        }

        /* 图标样式 */
        .tech-icon {
            width: 20px;
            height: 20px;
            position: relative;
            z-index: 1;
        }

        /* 语言切换图标 */
        .lang-icon {
            width: 20px;
            height: 20px;
            border: 2px solid #00d4ff;
            border-radius: 50%;
            position: relative;
        }

        .lang-icon::before,
        .lang-icon::after {
            content: '';
            position: absolute;
            border: 1px solid #00d4ff;
            border-radius: 50%;
        }

        .lang-icon::before {
            width: 100%;
            height: 8px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .lang-icon::after {
            width: 8px;
            height: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 退出图标 */
        .logout-icon {
            width: 20px;
            height: 20px;
            position: relative;
        }

        .logout-icon::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid #00d4ff;
            border-right: none;
            border-radius: 2px 0 0 2px;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        .logout-icon::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 2px;
            background: #00d4ff;
            right: 2px;
            top: 50%;
            transform: translateY(-50%);
        }

        .logout-icon .arrow {
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 4px 0 4px 6px;
            border-color: transparent transparent transparent #00d4ff;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        /* 工具提示 */
        .tooltip {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .tech-icon-btn:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }


        /* 主内容区 */
        .main-content {
            height: calc(100vh - 60px);
            margin-top: 60px;
            overflow-y: auto;
            padding: 20px;
        }

        /* 查询条件区域 */
        .alarm-query-section {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 150, 255, 0.2);
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 20px;
            margin-top: 0;
            position: relative;
            z-index: 10;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 16px;
            background: linear-gradient(45deg, #0096ff, #00d4ff);
            border-radius: 2px;
        }

        .query-form {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .form-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            white-space: nowrap;
            min-width: fit-content;
        }

        .form-select,
        .form-input {
            flex: 1;
            height: 40px;
            padding: 0 12px;
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 8px;
            font-size: 14px;
            background: rgba(15, 25, 42, 0.8);
            color: rgba(255, 255, 255, 0.9);
            transition: all 0.2s;
            cursor: pointer;
        }

        .form-select:focus,
        .form-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        /* 时间范围输入样式 */
        .date-range-group {
            flex: 1.5;
            min-width: 300px;
        }

        .date-range-input {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .date-input {
            flex: 1;
        }

        .date-separator {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            padding: 0 4px;
        }

        .btn {
            height: 40px;
            padding: 0 16px;
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            background: rgba(30, 41, 59, 0.8);
            color: rgba(255, 255, 255, 0.9);
        }

        .btn:hover {
            background: rgba(0, 150, 255, 0.1);
            border-color: #00d4ff;
        }

        .btn.primary {
            background: #00d4ff;
            color: #0a0e1a;
            border-color: #00d4ff;
        }

        .btn.primary:hover {
            background: #0096ff;
            transform: translateY(-1px);
        }

        .btn.danger {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        .btn.danger:hover {
            background: #dc2626;
        }

        /* 告警列表区域 */
        .alarm-list-section {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 150, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .list-actions {
            display: flex;
            gap: 12px;
        }

        /* 表格样式 */
        .alarm-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(0, 150, 255, 0.2);
        }

        .alarm-table th {
            background: rgba(15, 25, 42, 0.8);
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            padding: 16px 12px;
            text-align: left;
            font-size: 14px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.2);
        }

        .alarm-table td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }

        .alarm-table tbody tr:hover {
            background: rgba(0, 150, 255, 0.05);
        }

        /* 告警级别标签 */
        .alarm-level-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            min-width: 60px;
            display: inline-block;
        }

        .alarm-level-badge.critical {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .alarm-level-badge.major {
            background: rgba(249, 115, 22, 0.2);
            color: #f97316;
            border: 1px solid rgba(249, 115, 22, 0.3);
        }

        .alarm-level-badge.minor {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        /* 告警状态标签 */
        .alarm-status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            min-width: 60px;
            display: inline-block;
        }

        .alarm-status-badge.resolved {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .alarm-status-badge.unresolved {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* 分页控件 */
        .alarm-pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 150, 255, 0.2);
        }

        .pagination-info {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .pagination-controls {
            display: flex;
            gap: 8px;
        }

        .pagination-btn {
            height: 36px;
            padding: 0 12px;
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 6px;
            background: rgba(30, 41, 59, 0.8);
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .pagination-btn:hover:not(:disabled) {
            background: rgba(0, 150, 255, 0.1);
            border-color: #00d4ff;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 复选框样式 */
        .checkbox {
            width: 16px;
            height: 16px;
            accent-color: #00d4ff;
        }

        /* 操作按钮 */
        .action-btn {
            padding: 4px 8px;
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 4px;
            background: rgba(30, 41, 59, 0.8);
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            margin-right: 4px;
        }

        .action-btn:hover {
            background: rgba(0, 150, 255, 0.1);
            border-color: #00d4ff;
        }

        .action-btn.success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.3);
        }

        .action-btn.success:hover {
            background: rgba(16, 185, 129, 0.3);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            margin: 5% auto;
            padding: 24px;
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 12px;
            width: 80%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.2);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #00d4ff;
        }

        .close {
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .close:hover {
            color: #ef4444;
        }

        .detail-row {
            display: flex;
            margin-bottom: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
        }

        .detail-label {
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            width: 120px;
            flex-shrink: 0;
        }

        .detail-value {
            color: rgba(255, 255, 255, 0.9);
            flex: 1;
        }

        /* 通知样式 */
        .notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 12px 16px;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            z-index: 10000;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: #10b981;
        }

        .notification.error {
            background: #ef4444;
        }

        .notification.info {
            background: #3b82f6;
        }

        .notification.warning {
            background: #f59e0b;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .query-form {
                flex-direction: column;
                align-items: stretch;
            }

            .form-group {
                min-width: auto;
            }

            .alarm-table {
                font-size: 12px;
            }

            .alarm-table th,
            .alarm-table td {
                padding: 8px 6px;
            }

            .modal-content {
                width: 95%;
                margin: 2% auto;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 10px;
            }

            .alarm-query-section,
            .alarm-list-section {
                padding: 16px;
            }

            .list-header {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
            }

            .list-actions {
                justify-content: center;
            }

            .alarm-table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }

            .pagination-controls {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 150, 255, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 150, 255, 0.5);
        }
    </style>
</head>
<body>
    <!-- 背景效果 -->
    <div class="bg-effects"></div>

    <!-- 头部导航 -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-icon">
                    <img src="logo.png" alt="Logo">
                </div>
                <div class="logo-text">储能柜管理系统</div>
            </div>
        </div>
        
        <!-- 导航菜单 -->
        <nav class="nav-menu">
            <a href="home.html" class="nav-item" onclick="switchPage('home')">首页</a>
            <a href="data.html" class="nav-item" onclick="switchPage('data')">数据</a>
            <a href="control.html" class="nav-item" onclick="switchPage('control')">控制</a>
            <a href="alarm.html" class="nav-item active" onclick="switchPage('alarm')">告警</a>
            <a href="logs.html" class="nav-item" onclick="switchPage('log')">日志</a>
            <a href="settings.html" class="nav-item" onclick="switchPage('settings')">设置</a>
        </nav>
        
        <div class="header-right">
            <div class="header-time" id="currentTime">2024-01-31 14:30:00</div>
            
            <!-- 语言切换按钮 -->
            <div class="lang-switcher">
                <button class="lang-btn" onclick="toggleLanguageDropdown(event)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    </svg>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <div class="lang-option" onclick="changeLanguage('zh', event)">
                        <span class="flag">🇨🇳</span>
                        <span>中文</span>
                    </div>
                    <div class="lang-option" onclick="changeLanguage('en', event)">
                        <span class="flag">🇺🇸</span>
                        <span>English</span>
                    </div>
                </div>
            </div>
            
            <!-- 退出按钮 -->
            <div class="logout-wrapper">
                <button class="logout-btn" onclick="logout()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 查询条件 -->
        <div class="alarm-query-section">
            <div class="query-form">
                <div class="form-group">
                    <label class="form-label">告警级别</label>
                    <select class="form-select" id="levelSelect">
                        <option value="">全部级别</option>
                        <option value="critical">严重</option>
                        <option value="major">重要</option>
                        <option value="minor">一般</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">告警状态</label>
                    <select class="form-select" id="statusSelect">
                        <option value="">全部状态</option>
                        <option value="resolved">已解决</option>
                        <option value="unresolved">未解决</option>
                    </select>
                </div>
                <div class="form-group date-range-group">
                    <label class="form-label">时间范围</label>
                    <div class="date-range-input">
                        <input type="date" class="form-input date-input" id="startDate" placeholder="开始日期">
                        <span class="date-separator">至</span>
                        <input type="date" class="form-input date-input" id="endDate" placeholder="结束日期">
                    </div>
                </div>
                <div class="form-group" style="margin-left: auto; flex: 0 0 auto; min-width: auto; gap: 8px;">
                    <button class="btn primary" onclick="queryAlarms()">
                        <i class="fas fa-search"></i>
                        查询
                    </button>
                    <button class="btn" onclick="resetQuery()">
                        <i class="fas fa-undo"></i>
                        重置
                    </button>
                </div>
            </div>
        </div>

        <!-- 告警列表 -->
        <div class="alarm-list-section">
            <div class="list-header">
                <div class="section-title">告警列表</div>
                <div class="list-actions">
                    <button class="btn success" onclick="batchResolve()" id="batchResolveBtn" disabled>
                        <i class="fas fa-check"></i>
                        批量解决
                    </button>
                </div>
            </div>

            <table class="alarm-table">
                <thead>
                    <tr>
                        <th width="50">
                            <input type="checkbox" class="checkbox" id="selectAll" onchange="toggleAllAlarms()">
                        </th>
                        <th width="180">告警类型</th>
                        <th width="300">告警描述</th>
                        <th width="80">级别</th>
                        <th width="80">状态</th>
                        <th width="160">告警时间</th>
                        <th width="120">操作</th>
                    </tr>
                </thead>
                <tbody id="alarmTableBody">
                    <!-- 动态生成告警数据 -->
                </tbody>
            </table>

            <!-- 分页控件 -->
            <div class="alarm-pagination">
                <div class="pagination-info" id="paginationInfo">
                    第 1-10 条，共 0 条记录
                </div>
                <div class="pagination-controls">
                    <button class="pagination-btn" id="prevPageBtn" onclick="previousPage()" disabled>
                        <i class="fas fa-chevron-left"></i>
                        上一页
                    </button>
                    <span id="pageInfo" style="padding: 8px 12px; color: rgba(255,255,255,0.7);">第 1 页，共 1 页</span>
                    <button class="pagination-btn" id="nextPageBtn" onclick="nextPage()" disabled>
                        下一页
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 告警详情模态框 -->
    <div id="alarmDetailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">告警详情</div>
                <span class="close" onclick="closeAlarmDetail()">&times;</span>
            </div>
            <div id="alarmDetailContent">
                <!-- 动态生成详情内容 -->
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn success" onclick="resolveAlarmFromDetail()" id="resolveDetailBtn">
                    <i class="fas fa-check"></i>
                    解决告警
                </button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let allAlarms = [];
        let filteredAlarms = [];
        let currentPage = 1;
        const pageSize = 10;
        let selectedAlarmId = null;

        // 告警数据
        const alarmTypes = {
            critical: [
                { type: '电池过温告警', description: '电池温度超过安全阈值', threshold: '45°C' },
                { type: '系统过流告警', description: '系统电流超过额定值', threshold: '200A' },
                { type: '绝缘故障告警', description: '系统绝缘阻抗过低', threshold: '100MΩ' },
                { type: '烟雾探测告警', description: '检测到烟雾信号', threshold: '50ppm' },
                { type: '直流母线过压', description: '直流母线电压过高', threshold: '850V' },
                { type: '交流侧缺相', description: '交流侧出现缺相故障', threshold: 'N/A' },
                { type: '功率模块故障', description: 'IGBT功率模块异常', threshold: 'N/A' },
                { type: '冷却系统故障', description: '冷却系统工作异常', threshold: 'N/A' },
                { type: '应急停机触发', description: '应急停机按钮被触发', threshold: 'N/A' },
                { type: '消防系统启动', description: '消防系统自动启动', threshold: 'N/A' }
            ],
            major: [
                { type: 'SOC异常告警', description: '电池SOC超出正常范围', threshold: '5%-95%' },
                { type: '单体电压差异', description: '单体电池电压差异过大', threshold: '0.1V' },
                { type: '通讯中断告警', description: 'BMS通讯连接中断', threshold: '5s' },
                { type: '风扇故障告警', description: '散热风扇工作异常', threshold: 'N/A' },
                { type: '充电功率异常', description: '充电功率超出设定范围', threshold: '±10%' },
                { type: '放电功率异常', description: '放电功率超出设定范围', threshold: '±10%' },
                { type: '环境温度异常', description: '环境温度超出工作范围', threshold: '-10°C~45°C' },
                { type: '湿度超标告警', description: '环境湿度超出正常范围', threshold: '≤80%' },
                { type: '电能质量异常', description: '电网电能质量不达标', threshold: 'THD<5%' },
                { type: '均衡系统异常', description: '电池均衡系统工作异常', threshold: 'N/A' }
            ],
            minor: [
                { type: '设备维护提醒', description: '设备需要定期维护', threshold: 'N/A' },
                { type: '参数配置变更', description: '系统参数被手动修改', threshold: 'N/A' },
                { type: '用户登录异常', description: '检测到异常登录行为', threshold: 'N/A' },
                { type: '数据采集延迟', description: '数据采集存在延迟', threshold: '>1s' },
                { type: '存储空间不足', description: '系统存储空间使用率过高', threshold: '>90%' },
                { type: '网络连接不稳定', description: '网络连接质量较差', threshold: '丢包率>5%' },
                { type: '时钟同步异常', description: '系统时钟同步失败', threshold: '±1s' },
                { type: '负载均衡调整', description: '系统自动调整负载均衡', threshold: 'N/A' },
                { type: '电价策略变更', description: '峰谷电价策略已更新', threshold: 'N/A' },
                { type: '运行模式切换', description: '系统运行模式已切换', threshold: 'N/A' }
            ]
        };

        const sites = ['站点A', '站点B', '站点C', '站点D', '站点E', '站点F'];
        const devices = ['储能柜01', '储能柜02', '储能柜03', '储能柜04', '储能柜05', '储能柜06', '储能柜07', '储能柜08'];

        // 页面初始化
        window.onload = function() {
            // 检查登录状态
            const user = localStorage.getItem('touchscreen_user') || sessionStorage.getItem('touchscreen_user');
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // 设置默认日期范围（最近7天）
            const endDate = new Date();
            const startDate = new Date();
            startDate.setDate(endDate.getDate() - 7);
            
            document.getElementById('startDate').value = startDate.toISOString().split('T')[0];
            document.getElementById('endDate').value = endDate.toISOString().split('T')[0];

            // 更新时间
            updateTime();
            setInterval(updateTime, 1000);

            // 生成模拟数据
            generateAlarmData();
            
            // 渲染表格
            renderAlarmTable();
        };

        // 更新时间显示
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('currentTime').textContent = timeString;
        }

        // 登出功能
        // 切换页面
        function switchPage(page) {
            // 页面跳转
            if (page === 'home') {
                window.location.href = 'home.html';
            } else if (page === 'data') {
                window.location.href = 'data.html';
            } else if (page === 'control') {
                window.location.href = 'control.html';
            } else if (page === 'log') {
                window.location.href = 'logs.html';
            } else if (page === 'settings') {
                window.location.href = 'settings.html';
            }
            // alarm page stays on current page
        }

        // 切换语言下拉菜单
        function toggleLanguage(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('langDropdown');
            dropdown.classList.toggle('show');
        }

        // 选择语言
        function selectLanguage(lang, event) {
            event.stopPropagation();
            
            // 更新选中状态
            document.querySelectorAll('.lang-option').forEach(option => {
                option.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 保存语言设置
            localStorage.setItem('touchscreen_lang', lang);
            
            // 关闭下拉菜单
            document.getElementById('langDropdown').classList.remove('show');
            
            // 这里可以添加语言切换逻辑
            console.log('切换语言到:', lang);
        }

        // 点击其他地方关闭下拉菜单
        document.addEventListener('click', function(e) {
            const langBtn = document.querySelector('.tech-icon-btn');
            if (langBtn && !langBtn.contains(e.target)) {
                document.getElementById('langDropdown').classList.remove('show');
            }
        });

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('touchscreen_user');
                sessionStorage.removeItem('touchscreen_user');
                window.location.href = 'login.html';
            }
        }

        // 生成告警数据
        function generateAlarmData() {
            allAlarms = [];
            let alarmId = 1;

            // 为每个站点和设备生成告警
            sites.forEach(site => {
                devices.forEach(device => {
                    // 随机生成0-3个告警
                    const alarmCount = Math.floor(Math.random() * 4);
                    
                    for (let i = 0; i < alarmCount; i++) {
                        const levels = ['critical', 'major', 'minor'];
                        const level = levels[Math.floor(Math.random() * levels.length)];
                        const alarmTypeData = alarmTypes[level][Math.floor(Math.random() * alarmTypes[level].length)];
                        
                        // 随机生成告警时间（最近7天内）
                        const alarmTime = new Date();
                        alarmTime.setTime(alarmTime.getTime() - Math.random() * 7 * 24 * 60 * 60 * 1000);
                        
                        const alarm = {
                            id: alarmId++,
                            type: alarmTypeData.type,
                            description: alarmTypeData.description,
                            level: level,
                            levelText: level === 'critical' ? '严重' : level === 'major' ? '重要' : '一般',
                            device: device,
                            site: site,
                            status: Math.random() > 0.3 ? 'resolved' : 'unresolved',
                            statusText: Math.random() > 0.3 ? '已解决' : '未解决',
                            time: alarmTime.toLocaleString('zh-CN'),
                            currentValue: generateCurrentValue(alarmTypeData.type),
                            threshold: alarmTypeData.threshold,
                            resolveTime: Math.random() > 0.3 ? new Date(alarmTime.getTime() + Math.random() * 24 * 60 * 60 * 1000).toLocaleString('zh-CN') : null
                        };
                        
                        allAlarms.push(alarm);
                    }
                });
            });

            // 按时间倒序排列
            allAlarms.sort((a, b) => new Date(b.time) - new Date(a.time));
            filteredAlarms = [...allAlarms];
        }

        // 生成当前值
        function generateCurrentValue(type) {
            const valueMap = {
                '电池过温告警': (45 + Math.random() * 10).toFixed(1) + '°C',
                '系统过流告警': (200 + Math.random() * 50).toFixed(1) + 'A',
                '绝缘故障告警': (50 + Math.random() * 40).toFixed(1) + 'MΩ',
                '烟雾探测告警': (50 + Math.random() * 20).toFixed(1) + 'ppm',
                '直流母线过压': (850 + Math.random() * 50).toFixed(1) + 'V',
                'SOC异常告警': (Math.random() > 0.5 ? (95 + Math.random() * 5) : (0 + Math.random() * 5)).toFixed(1) + '%',
                '单体电压差异': (0.1 + Math.random() * 0.1).toFixed(3) + 'V',
                '充电功率异常': (Math.random() * 100 + 250).toFixed(1) + 'kW',
                '放电功率异常': (Math.random() * 100 + 250).toFixed(1) + 'kW',
                '环境温度异常': (Math.random() > 0.5 ? (45 + Math.random() * 10) : (-15 + Math.random() * 5)).toFixed(1) + '°C',
                '湿度超标告警': (80 + Math.random() * 15).toFixed(1) + '%',
                '数据采集延迟': (1 + Math.random() * 2).toFixed(2) + 's',
                '存储空间不足': (90 + Math.random() * 8).toFixed(1) + '%',
                '网络连接不稳定': (5 + Math.random() * 10).toFixed(1) + '%'
            };
            
            return valueMap[type] || 'N/A';
        }

        // 查询告警
        function queryAlarms() {
            const site = document.getElementById('siteSelect').value;
            const device = document.getElementById('deviceInput').value;
            const level = document.getElementById('levelSelect').value;
            const status = document.getElementById('statusSelect').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            filteredAlarms = allAlarms.filter(alarm => {
                let match = true;
                
                if (site && alarm.site !== site) match = false;
                if (device && !alarm.device.toLowerCase().includes(device.toLowerCase())) match = false;
                if (level && alarm.level !== level) match = false;
                if (status && alarm.status !== status) match = false;
                
                if (startDate) {
                    const alarmDate = new Date(alarm.time);
                    const start = new Date(startDate);
                    if (alarmDate < start) match = false;
                }
                
                if (endDate) {
                    const alarmDate = new Date(alarm.time);
                    const end = new Date(endDate);
                    end.setHours(23, 59, 59, 999);
                    if (alarmDate > end) match = false;
                }
                
                return match;
            });

            currentPage = 1;
            renderAlarmTable();
            showNotification('查询完成', 'success');
        }

        // 重置查询
        function resetQuery() {
            document.getElementById('siteSelect').value = '';
            document.getElementById('deviceInput').value = '';
            document.getElementById('levelSelect').value = '';
            document.getElementById('statusSelect').value = '';
            
            const endDate = new Date();
            const startDate = new Date();
            startDate.setDate(endDate.getDate() - 7);
            
            document.getElementById('startDate').value = startDate.toISOString().split('T')[0];
            document.getElementById('endDate').value = endDate.toISOString().split('T')[0];

            filteredAlarms = [...allAlarms];
            currentPage = 1;
            renderAlarmTable();
            showNotification('查询条件已重置', 'info');
        }

        // 渲染告警表格
        function renderAlarmTable() {
            const tbody = document.getElementById('alarmTableBody');
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageData = filteredAlarms.slice(startIndex, endIndex);

            let html = '';
            pageData.forEach(alarm => {
                html += `
                    <tr>
                        <td>
                            <input type="checkbox" class="checkbox alarm-checkbox" value="${alarm.id}" onchange="updateBatchButton()">
                        </td>
                        <td>${alarm.type}</td>
                        <td>${alarm.description}</td>
                        <td>
                            <span class="alarm-level-badge ${alarm.level}">${alarm.levelText}</span>
                        </td>
                        <td>
                            <span class="alarm-status-badge ${alarm.status}">${alarm.statusText}</span>
                        </td>
                        <td>${alarm.time}</td>
                        <td style="white-space: nowrap;">
                            <button class="action-btn" onclick="viewAlarmDetail(${alarm.id})" style="display: inline-block;">
                                <i class="fas fa-eye"></i>
                                详情
                            </button>
                            ${alarm.status === 'unresolved' ? `
                                <button class="action-btn success" onclick="resolveAlarm(${alarm.id})" style="display: inline-block;">
                                    <i class="fas fa-check"></i>
                                    解决
                                </button>
                            ` : ''}
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
            updatePagination();
            updateBatchButton();
        }

        // 更新分页信息
        function updatePagination() {
            const totalPages = Math.ceil(filteredAlarms.length / pageSize);
            const startIndex = (currentPage - 1) * pageSize + 1;
            const endIndex = Math.min(currentPage * pageSize, filteredAlarms.length);

            document.getElementById('paginationInfo').textContent = 
                `第 ${startIndex}-${endIndex} 条，共 ${filteredAlarms.length} 条记录`;
            
            document.getElementById('pageInfo').textContent = 
                `第 ${currentPage} 页，共 ${totalPages} 页`;

            document.getElementById('prevPageBtn').disabled = currentPage <= 1;
            document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
        }

        // 上一页
        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                renderAlarmTable();
            }
        }

        // 下一页
        function nextPage() {
            const totalPages = Math.ceil(filteredAlarms.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderAlarmTable();
            }
        }

        // 全选切换
        function toggleAllAlarms() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.alarm-checkbox');
            
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll.checked;
            });
            
            updateBatchButton();
        }

        // 更新批量操作按钮状态
        function updateBatchButton() {
            const checkedBoxes = document.querySelectorAll('.alarm-checkbox:checked');
            const batchBtn = document.getElementById('batchResolveBtn');
            const selectAll = document.getElementById('selectAll');
            const totalCheckboxes = document.querySelectorAll('.alarm-checkbox');
            
            batchBtn.disabled = checkedBoxes.length === 0;
            selectAll.checked = checkedBoxes.length === totalCheckboxes.length && totalCheckboxes.length > 0;
            selectAll.indeterminate = checkedBoxes.length > 0 && checkedBoxes.length < totalCheckboxes.length;
        }

        // 批量解决告警
        function batchResolve() {
            const checkedBoxes = document.querySelectorAll('.alarm-checkbox:checked');
            const alarmIds = Array.from(checkedBoxes).map(cb => parseInt(cb.value));
            
            if (alarmIds.length === 0) return;
            
            if (confirm(`确定要解决选中的 ${alarmIds.length} 个告警吗？`)) {
                alarmIds.forEach(id => {
                    const alarm = allAlarms.find(a => a.id === id);
                    if (alarm && alarm.status === 'unresolved') {
                        alarm.status = 'resolved';
                        alarm.statusText = '已解决';
                        alarm.resolveTime = new Date().toLocaleString('zh-CN');
                    }
                });
                
                renderAlarmTable();
                showNotification(`成功解决 ${alarmIds.length} 个告警`, 'success');
            }
        }

        // 查看告警详情
        function viewAlarmDetail(alarmId) {
            const alarm = allAlarms.find(a => a.id === alarmId);
            if (!alarm) return;
            
            selectedAlarmId = alarmId;
            
            const detailContent = document.getElementById('alarmDetailContent');
            detailContent.innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">告警ID:</div>
                    <div class="detail-value">${alarm.id}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">告警类型:</div>
                    <div class="detail-value">${alarm.type}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">告警描述:</div>
                    <div class="detail-value">${alarm.description}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">告警级别:</div>
                    <div class="detail-value">
                        <span class="alarm-level-badge ${alarm.level}">${alarm.levelText}</span>
                    </div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">设备名称:</div>
                    <div class="detail-value">${alarm.device}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">站点名称:</div>
                    <div class="detail-value">${alarm.site}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">当前值:</div>
                    <div class="detail-value">${alarm.currentValue}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">阈值:</div>
                    <div class="detail-value">${alarm.threshold}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">告警状态:</div>
                    <div class="detail-value">
                        <span class="alarm-status-badge ${alarm.status}">${alarm.statusText}</span>
                    </div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">告警时间:</div>
                    <div class="detail-value">${alarm.time}</div>
                </div>
                ${alarm.resolveTime ? `
                    <div class="detail-row">
                        <div class="detail-label">解决时间:</div>
                        <div class="detail-value">${alarm.resolveTime}</div>
                    </div>
                ` : ''}
                <div class="detail-row">
                    <div class="detail-label">处理记录:</div>
                    <div class="detail-value">
                        ${alarm.status === 'resolved' ? 
                            `${alarm.resolveTime} - 告警已解决<br>
                             ${alarm.time} - 告警产生` : 
                            `${alarm.time} - 告警产生`}
                    </div>
                </div>
            `;
            
            const resolveBtn = document.getElementById('resolveDetailBtn');
            if (alarm.status === 'resolved') {
                resolveBtn.style.display = 'none';
            } else {
                resolveBtn.style.display = 'inline-flex';
            }
            
            document.getElementById('alarmDetailModal').style.display = 'block';
        }

        // 从详情页解决告警
        function resolveAlarmFromDetail() {
            if (selectedAlarmId) {
                resolveAlarm(selectedAlarmId);
                closeAlarmDetail();
            }
        }

        // 解决告警
        function resolveAlarm(alarmId) {
            const alarm = allAlarms.find(a => a.id === alarmId);
            if (alarm && alarm.status === 'unresolved') {
                alarm.status = 'resolved';
                alarm.statusText = '已解决';
                alarm.resolveTime = new Date().toLocaleString('zh-CN');
                
                renderAlarmTable();
                showNotification('告警已解决', 'success');
            }
        }

        // 关闭告警详情
        function closeAlarmDetail() {
            document.getElementById('alarmDetailModal').style.display = 'none';
            selectedAlarmId = null;
        }

        // 导出告警数据
        function exportAlarms() {
            if (filteredAlarms.length === 0) {
                showNotification('没有数据可导出', 'warning');
                return;
            }
            
            const headers = ['告警ID', '告警类型', '告警描述', '级别', '状态', '当前值', '阈值', '告警时间', '解决时间'];
            const csvContent = [
                '\ufeff' + headers.join(','), // UTF-8 BOM
                ...filteredAlarms.map(alarm => [
                    alarm.id,
                    `"${alarm.type}"`,
                    `"${alarm.description}"`,
                    alarm.levelText,
                    alarm.statusText,
                    `"${alarm.currentValue}"`,
                    `"${alarm.threshold}"`,
                    `"${alarm.time}"`,
                    alarm.resolveTime ? `"${alarm.resolveTime}"` : ''
                ].join(','))
            ].join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `告警数据_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showNotification('导出成功', 'success');
        }

        // 显示通知
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            // 显示动画
            setTimeout(() => {
                notification.classList.add('show');
            }, 100);
            
            // 3秒后隐藏
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    if (document.body.contains(notification)) {
                        document.body.removeChild(notification);
                    }
                }, 300);
            }, 3000);
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('alarmDetailModal');
            if (event.target === modal) {
                closeAlarmDetail();
            }
        }
    </script>
    <script src="common-header-scripts.js"></script>
</body>
</html>
